<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>课程数据上传工具 — 电商PM学院</title>
<style>
  body { font-family: 'Inter', sans-serif; background: #0f1113; color: #c8cdd2; padding: 30px; max-width: 700px; margin: 0 auto; }
  h1 { color: #fff; font-size: 20px; margin-bottom: 6px; }
  .sub { color: #5a6370; font-size: 13px; margin-bottom: 24px; }
  .card { background: #1e2226; border: 1px solid rgba(255,255,255,.07); border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .card h2 { color: #fff; font-size: 14px; margin: 0 0 12px; }
  .log { background: #0f1113; border: 1px solid rgba(255,255,255,.07); border-radius: 8px; padding: 14px; font-size: 12px; font-family: monospace; height: 280px; overflow-y: auto; line-height: 1.7; }
  .log .ok { color: #00a87e; }
  .log .err { color: #e23b4a; }
  .log .info { color: #8d969e; }
  .log .warn { color: #ec7e00; }
  button { padding: 11px 24px; border-radius: 10px; border: none; background: #fff; color: #000; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-right: 10px; transition: opacity .15s; }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.danger { background: #e23b4a; color: #fff; }
  .progress { height: 6px; background: rgba(255,255,255,.08); border-radius: 9999px; margin: 12px 0; overflow: hidden; }
  .progress-bar { height: 100%; background: #00a87e; border-radius: 9999px; transition: width .3s; width: 0%; }
  .stat { display: flex; gap: 16px; margin-top: 12px; }
  .stat-item { flex: 1; background: #0f1113; border-radius: 8px; padding: 10px; text-align: center; }
  .stat-n { font-size: 24px; font-weight: 700; color: #fff; }
  .stat-l { font-size: 11px; color: #5a6370; margin-top: 2px; }
</style>
</head>
<body>

<h1>📚 课程数据上传工具</h1>
<p class="sub">将30天课程数据批量上传到 Firebase Firestore，完成后课程内容将从数据库动态加载。</p>

<div class="card">
  <h2>上传状态</h2>
  <div class="stat">
    <div class="stat-item"><div class="stat-n" id="s-total">30</div><div class="stat-l">总天数</div></div>
    <div class="stat-item"><div class="stat-n" id="s-done" style="color:#00a87e">0</div><div class="stat-l">已上传</div></div>
    <div class="stat-item"><div class="stat-n" id="s-fail" style="color:#e23b4a">0</div><div class="stat-l">失败</div></div>
  </div>
  <div class="progress"><div class="progress-bar" id="prog-bar"></div></div>
  <button id="btn-start" onclick="startUpload()">🚀 开始上传全部30天</button>
  <button id="btn-stop" onclick="stopUpload()" disabled>⏹ 停止</button>
</div>

<div class="card">
  <h2>上传日志</h2>
  <div class="log" id="log"></div>
</div>

<script type="module">
// ── Firebase SDK ──
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

// ── Firebase 配置（与主网站一致）──
const firebaseConfig = {
  apiKey: "AIzaSyAyzXv6HcRTck_xwkn89PirI_Yze-9xYAY",
  authDomain: "pm-course-8f0ff.firebaseapp.com",
  projectId: "pm-course-8f0ff",
  storageBucket: "pm-course-8f0ff.firebasestorage.app",
  messagingSenderId: "521287916902",
  appId: "1:521287916902:web:05aba767230259321cbca7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ── 日志工具 ──
function log(msg, type='info') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = type;
  const time = new Date().toLocaleTimeString('zh-CN');
  line.textContent = `[${time}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

let _stop = false;
let _done = 0;
let _fail = 0;

function updateStats() {
  document.getElementById('s-done').textContent = _done;
  document.getElementById('s-fail').textContent = _fail;
  document.getElementById('prog-bar').style.width = ((_done + _fail) / 30 * 100) + '%';
}

window.stopUpload = function() {
  _stop = true;
  log('⏹ 用户停止上传', 'warn');
  document.getElementById('btn-stop').disabled = true;
};

window.startUpload = async function() {
  _stop = false;
  _done = 0;
  _fail = 0;
  updateStats();
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('log').innerHTML = '';

  log('🔍 检查登录状态...', 'info');

  const user = auth.currentUser;
  if (!user) {
    log('❌ 未登录！请用管理员账号登录后再运行此工具', 'err');
    log('提示：打开浏览器控制台(F12)，用以下命令登录：', 'warn');
    log('window._auth.signInWithEmailAndPassword(auth, "你的邮箱", "你的密码")', 'warn');
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    return;
  }

  log(`✅ 已登录：${user.email}`, 'ok');
  log(`📤 开始上传30天课程数据到 Firestore...`, 'info');
  log('────────────────────────────', 'info');

  // ── 课程数据 ──
  const DAYS = {
  d1:{
    title:'双边市场逻辑',tag:'Day 1 · 第一周',
    desc:'理解电商平台的商业本质：买家与商家如何互相吸引，飞轮如何从0到高速运转。',
    theory:`
<div style="margin-bottom:16px">
  <div style="font-size:9px;font-weight:800;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">三大平台横向对比 — 点击切换</div>
  <div style="display:flex;gap:6px;margin-bottom:14px">
    <button onclick="plt('d1','tb')" id="d1-plt-tb" class="plt-btn plt-on">🟠 淘宝</button>
    <button onclick="plt('d1','jd')" id="d1-plt-jd" class="plt-btn">🔴 京东</button>
    <button onclick="plt('d1','pdd')" id="d1-plt-pdd" class="plt-btn">🟣 拼多多</button>
  </div>
  <div id="d1-plt-data">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div class="info-card"><div class="ic-l">核心策略</div><div class="ic-v">供给侧优先<br>海量长尾商家</div></div>
      <div class="info-card"><div class="ic-l">目标用户</div><div class="ic-v">全人群<br>重点一二线女性</div></div>
      <div class="info-card"><div class="ic-l">商家模式</div><div class="ic-v">轻资产撮合<br>第三方商家</div></div>
      <div class="info-card"><div class="ic-l">变现方式</div><div class="ic-v">广告（直通车）<br>+ 佣金</div></div>
    </div>
    <div class="info-card" style="margin-bottom:10px">
      <div class="ic-l">淘宝增长飞轮</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px">
        <span class="flow-node">免费开店</span><span class="flow-arrow">→</span>
        <span class="flow-node">海量商家</span><span class="flow-arrow">→</span>
        <span class="flow-node">SKU极丰富</span><span class="flow-arrow">→</span>
        <span class="flow-node">买家涌入</span><span class="flow-arrow">→</span>
        <span class="flow-node">流量变广告费</span><span class="flow-arrow">→</span>
        <span class="flow-node">更多商家付费</span>
      </div>
    </div>
    <div style="margin-bottom:10px">
      <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">核心能力维度</div>
      <div class="score-bar-wrap"><div class="score-bar-lbl">供给丰富度</div><div class="score-bar-track"><div class="score-bar-fill" style="width:95%;background:var(--green)"></div></div></div>
      <div class="score-bar-wrap"><div class="score-bar-lbl">品质保障</div><div class="score-bar-track"><div class="score-bar-fill" style="width:55%;background:var(--amber)"></div></div></div>
      <div class="score-bar-wrap"><div class="score-bar-lbl">价格竞争力</div><div class="score-bar-track"><div class="score-bar-fill" style="width:80%;background:var(--green)"></div></div></div>
      <div class="score-bar-wrap"><div class="score-bar-lbl">用户信任</div><div class="score-bar-track"><div class="score-bar-fill" style="width:68%;background:var(--amber)"></div></div></div>
    </div>
    <div class="pm-insight"><div class="pmi-label">PM洞察</div><div class="pmi-text">淘宝的核心产品问题：供给太丰富导致"选择困难"——搜索和推荐算法因此成为最核心的产品能力。双11、直播等本质上都是在解决"海量供给下如何帮用户做决策"这个问题。</div></div>
  </div>
</div>
<div class="kp"><div class="kp-h">双边市场三大核心机制</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>跨边网络效应：</strong>一边用户增加，另一边价值也提升。买家多→商家愿来；商家多→买家愿来。正向循环是平台护城河的核心，也是新进入者最难打破的壁垒。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>冷启动困境：</strong>必须同时破两侧。淘宝：免费开店（破商家侧）+ 支付宝担保（破买家信任）。两侧任一缺失，平台都无法启动。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>飞轮反转风险：</strong>假货→买家信任下降→买家流失→商家流量降→广告ROI降→商家减投。这是平台最危险的负向循环，一旦启动极难逆转。</div></div>
</div>`,
    flashcards:[
      {q:'淘宝、京东、拼多多分别用什么策略解决冷启动？',a:'淘宝：双侧同时破——免费开店+支付宝担保。京东：绕开冷启动——自营直接保证品质。拼多多：先破买家侧——微信裂变+工厂直供极致低价。'},
      {q:'跨边网络效应为什么是平台护城河的核心？',a:'一边用户增加，另一边价值也提升，形成正向循环越大越强。新进入者难以打破——要吸引商家必须先有买家，但没有商家就没有买家，陷入先有鸡还是先有蛋的困境。'},
      {q:'平台飞轮反转的风险是什么？以淘宝假货为例。',a:'飞轮反转：正向循环变成负向螺旋。假货增多→买家信任下降→买家流失→商家流量降→广告ROI降→商家减少投入→平台收入减少→更少资源治理假货→假货更多。'},
      {q:'双边平台收费应该向哪一边收？为什么？',a:'向价格不敏感、获益更大的一侧收费，通常向商家收：专业经营者、对平台流量有强需求、切换成本高。买家免费才能吸引足够多流量。'},
    ],
    quiz:[
      {q:'拼多多早期成功获客的核心策略是？',opts:['A. 大规模电视广告投放','B. 利用微信社交关系链进行拼团裂变','C. 用低价补贴直接购买流量','D. SEO搜索流量优化'],ans:'B',expl:'拼多多把微信社交关系链变成传播渠道——拼团需要拉朋友，拉朋友本身就是免费获客，在巨头夹击中找到低成本突破口。'},
      {q:'飞轮中为什么必须加入变现环节？',opts:['A. 投资人要求盈利','B. 没有收入就无法持续优化体验，飞轮会停转','C. 平台需要缴税','D. 阻止竞争对手进入'],ans:'B',expl:'没有变现环节的飞轮是「慈善」。收入→更好产品→更多用户→更多收入，这个闭环必须成立，否则资金耗尽飞轮停转。'},
    ],
    practice:{
      context:'你是淘宝的PM，最近一季度GMV增速明显放缓。老板要求你做诊断报告，找出根本原因并提出改进方案。数据显示：DAU平稳，买家平均访问时长下降12%，商家数量稳定，但头部品牌商家广告投放预算下降了18%。',
      questions:['问题1：根据双边市场理论，GMV增速放缓的根本原因最可能是什么？请从买家侧和商家侧两个维度各给出1-2个假设。','问题2：为什么头部品牌商家广告投放预算下降18%是危险信号？请用飞轮逻辑推导可能的负向循环。','问题3：如果只能做一件事来快速提振GMV，你会优先做什么？请说明决策逻辑和预期效果。']
    }
  },
  d2:{
    title:'GMV驱动模型',tag:'Day 2 · 第一周',
    desc:'GMV = 流量 × 转化率 × 客单价 × 复购率，四个杠杆的产品设计逻辑与ROI对比。',
    theory:`
<div class="info-card" style="margin-bottom:12px">
  <div class="ic-l">GMV公式拆解</div>
  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px">
    <span class="flow-node" style="background:var(--blue-d);border-color:var(--blb);color:#8085f5">流量</span>
    <span class="flow-arrow">×</span>
    <span class="flow-node" style="background:var(--gd);border-color:var(--gb);color:var(--green)">转化率</span>
    <span class="flow-arrow">×</span>
    <span class="flow-node" style="background:var(--ad);border-color:rgba(236,126,0,.3);color:var(--amber)">客单价</span>
    <span class="flow-arrow">×</span>
    <span class="flow-node" style="background:var(--rd);border-color:rgba(226,59,74,.3);color:var(--red)">复购率</span>
    <span class="flow-arrow">=</span>
    <span class="flow-node" style="background:var(--t1);color:var(--s1)">GMV</span>
  </div>
</div>
<div style="margin-bottom:12px">
  <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">四杠杆 ROI 对比</div>
  <div class="score-bar-wrap"><div class="score-bar-lbl">买流量</div><div class="score-bar-track"><div class="score-bar-fill" style="width:20%;background:var(--red)"></div></div><span class="score-tag tag-r">ROI 1x</span></div>
  <div class="score-bar-wrap"><div class="score-bar-lbl">提升转化率</div><div class="score-bar-track"><div class="score-bar-fill" style="width:55%;background:var(--amber)"></div></div><span class="score-tag tag-a">ROI 2.5x</span></div>
  <div class="score-bar-wrap"><div class="score-bar-lbl">提升客单价</div><div class="score-bar-track"><div class="score-bar-fill" style="width:45%;background:var(--blue)"></div></div><span class="score-tag" style="background:var(--bld);color:#8085f5;border-color:var(--blb)">ROI 2x</span></div>
  <div class="score-bar-wrap"><div class="score-bar-lbl">提升复购率</div><div class="score-bar-track"><div class="score-bar-fill" style="width:95%;background:var(--green)"></div></div><span class="score-tag tag-g">ROI 6x</span></div>
</div>
<div class="pm-insight"><div class="pmi-label">为什么复购ROI最高</div><div class="pmi-text">获客成本已付，边际成本≈0。复购用户带口碑，还能降低下一个用户的获客成本。会员积分系统、专属优惠、个性化推荐——这些都是提升复购率最有效的产品手段。</div></div>
<div class="kp" style="margin-top:12px"><div class="kp-h">PM必须警惕的数据陷阱</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>DAU增长≠GMV增长：</strong>要看有效访客（有购买意图）而非总UV。1000个薅羊毛用户不如100个有真实购买意图的用户。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>客单价↑≠收入↑：</strong>提价可能同步压低转化率，需要计算整体GMV影响，不能只看单一指标。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>活动流量有副作用：</strong>大促带来的价格敏感用户，活动结束后复购率极低，可能拉低整体用户质量。</div></div>
</div>`,
    flashcards:[
      {q:'GMV四杠杆各提升10%，增量相同。PM最应优先提升哪个？',a:'优先提升复购率。①成本最低——获客成本已付，边际成本≈0；②副作用最小；③效果持久；④LTV高——复购用户带口碑降低获客成本。'},
      {q:'"只看DAU增长"是PM常见陷阱，为什么？',a:'流量要看质量不是数量。1000个薅羊毛用户不如100个有真实购买意图的用户。盲目买流量会稀释转化率，拉低整体GMV效率。应看"有效访客"。'},
      {q:'提升客单价和转化率之间存在什么权衡？',a:'负相关：价格越高，购买门槛越高，转化率越低。正确策略：在高转化用户中推高客单价（关联推荐、套装），而不是直接提价。'},
    ],
    quiz:[
      {q:'四个增长方案ROI最高的是？①买流量包 ②优化详情页转化率 ③推套装提客单价 ④会员积分提复购',opts:['A. 买流量包','B. 优化详情页','C. 推出套装','D. 会员积分系统'],ans:'D',expl:'会员积分系统提升复购率ROI最高——获客成本已付，留住用户再次购买的边际成本接近于零，且有长期效果。'},
      {q:'GMV = 流量+转化率+客单价+复购率，这个公式正确吗？',opts:['A. 正确，GMV是四者之和','B. 错误，GMV是四者之积','C. 正确，只需要其中一个增长','D. 错误，只有流量最重要'],ans:'B',expl:'GMV = 流量 × 转化率 × 客单价 × 复购率，是乘法关系。每个因子提升10%，结果各提升10%，而不是叠加。'},
    ],
    practice:{
      context:'你是某垂直美妆电商的PM。平台DAU 50万，月GMV 1亿元。数据：月访客500万，整体转化率2%，客单价100元，月复购率10%。老板希望下季度月GMV达到1.2亿，即增长20%。',
      questions:['问题1：如果只能优化一个杠杆实现GMV+20%，你选哪个？请量化说明需要提升多少个百分点，以及对应的产品改进策略。','问题2：分析发现添加购物车的用户中，45%没有最终下单。这说明哪个杠杆出了问题？根因可能有哪些？如何用数据进一步定位？','问题3：美妆用户普遍存在"囤货"心理，如何设计一个产品功能同时提升客单价和复购率？请描述具体功能设计和预期指标变化。']
    }
  },
  d3:{
    title:'用户购物旅程',tag:'Day 3 · 第一周',
    desc:'发现→浏览→决策→下单→收货→复购，完整链路每步设计要点与诊断方法。',
    theory:`
<div style="margin-bottom:14px">
  <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">六阶段旅程全景</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px;text-align:center">
      <div style="font-size:18px;margin-bottom:4px">🔍</div>
      <div style="font-size:11px;font-weight:700;color:var(--t1)">发现</div>
      <div style="font-size:9px;color:var(--blue);font-weight:600;margin-top:3px">CTR 6-12%</div>

      {q:'为什么退货越容易，用户下次越敢买？',a:'退货门槛低降低了购买决策风险。"不满意可以退"→用户敢尝试高价商品→客单价提升→GMV增长。京东的退货体验是其高客单价用户信任的核心来源。'},
      {q:'为什么"加购率高但转化率低"是严重的产品问题？',a:'用户有购买意愿但在最终下单时遇到阻碍。高加购低转化的根因通常是：价格焦虑（优惠券不可见）、支付摩擦、安全顾虑。每一个加购未转化都是已投入成本获得的意向白白浪费。'},

      {q:'新用户首单转化率（3%）远低于老用户复购转化率（12%），最核心原因是？',opts:['A. 新用户不了解商品','B. 新用户对平台缺乏信任，不确定是否值得购买','C. 新用户没有优惠券','D. 新用户手机网速慢'],ans:'B',expl:'信任是新用户最大的购买障碍。老用户已有成功购买体验，信任建立后复购决策成本大幅降低。这就是为什么"新用户首单优惠"、"30天无理由退货"本质上都在降低信任门槛。'},

  d4:{

    theory:`

<div class="pm-insight"><div class="pmi-label">反直觉洞察：广告位增加≠收入增加</div><div class="pmi-text">广告位越多，每个广告位的稀缺性越低→广告CTR越低→商家ROI越低→商家撤预算→平台收入反而下降。正确做法是提升精准度而非增加数量——精准广告对用户来说就是"有用的推荐"。</div></div>`,
    flashcards:[
      {q:'搜索CTR从8%下降到6%，可能的原因有哪些？',a:'①广告位增加，自然结果被挤到更下方（最常见）；②搜索词变化，用户搜索更精准而排名靠后；③竞争加剧；④自然排序算法调整；⑤用户习惯改变（更倾向于推荐流）。诊断时要区分自然CTR vs 整体CTR。'},
      {q:'推荐系统的"探索-利用"权衡是什么意思？',a:'利用（Exploitation）：推荐用户过去喜欢的内容，转化率高但体验会越来越窄（信息茧房）。探索（Exploration）：推荐用户未见过的内容。好的推荐系统要平衡：既满足当下需求，又不断扩展用户兴趣边界。'},
      {q:'为什么"电商搜索"和"信息搜索"的产品逻辑完全不同？',a:'信息搜索（Google）：用户想找唯一正确答案，相关性最重要。电商搜索（淘宝）：要综合考虑相关性、价格竞争力、转化率预测、商家评级、广告出价、库存状态。本质是多目标优化问题，要同时兼顾用户体验和平台商业利益。'},
    ],
    quiz:[
      {q:'搜索广告CTR（3.1%）远低于自然结果CTR（11.2%），正确的改进方向是？',opts:['A. 减少广告位，保护自然结果CTR','B. 增加更多广告位来提升广告收入','C. 用人群包定向提升广告精准度，让广告CTR接近自然CTR','D. 把广告位改成自然结果风格来提升CTR'],ans:'C',expl:'低广告CTR说明广告与用户意图不匹配。提升精准度而不是增加数量——精准广告对用户来说就是"有用的结果"，CTR提升，商家ROI提升，平台收入也随之提升。'},
      {q:'哪个指标最能反映推荐系统的质量？',opts:['A. 推荐点击率（CTR）','B. 推荐引发的长期复购率','C. 推荐页面的PV（页面访问量）','D. 推荐算法的运行速度'],ans:'B',expl:'点击率高可能只是"标题党"，PV高可能是用户找不到内容反复刷新。推荐质量最终体现在：用户因为推荐而产生了之前没计划的购买，且这次购买带来了正向体验和后续复购。'},
    ],
    practice:{
      context:'你是某综合电商搜索产品的PM。本周一早上收到数据警报：过去7天搜索模块整体CTR下降22%（9.8%→7.6%），但搜索UV未下降。同期，广告收入增长了8%。你需要在今天下午的周会上向VP汇报这个问题并给出解决方案。',

  d6:{
    title:'平台规则与治理',tag:'Day 6 · 第一周',
    desc:'平台是裁判员，规则设计决定生态健康。理解违规处理、算法公平性与申诉机制。',
    theory:`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
  <div style="background:var(--rd);border:1px solid rgba(226,59,74,.2);border-radius:11px;padding:14px">
    <div style="font-size:10px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">⚖️ 规则的本质</div>
    <div style="font-size:12px;color:var(--t2);line-height:1.7">平台规则 = <strong style="color:var(--t1)">激励系统设计</strong><br>好的规则奖励好行为，惩罚差行为，形成正向生态</div>
  </div>
  <div style="background:var(--gd);border:1px solid var(--gb);border-radius:11px;padding:14px">
    <div style="font-size:10px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">🎯 PM的角色</div>
    <div style="font-size:12px;color:var(--t2);line-height:1.7">既要保护买家不受伤害，又要让商家经营环境公平透明，<strong style="color:var(--t1)">两者缺一不可</strong></div>
  </div>
</div>
<div class="kp"><div class="kp-h">平台治理四大维度</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>内容/商品质量：</strong>假货、违禁品、虚假描述。后果：买家信任崩塌，飞轮反转。工具：AI质检+人工抽检+用户举报。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>竞争公平性：</strong>刷单、黑搜、恶意差评。后果：劣币驱逐良币，优质商家离开。工具：行为模式检测+账号风控。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>价格秩序：</strong>价格欺诈、大数据杀熟。后果：用户愤怒、媒体曝光、监管介入。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>数据安全：</strong>用户隐私保护、第三方数据滥用。后果：法律风险+品牌声誉损失。</div></div>
</div>
<div class="info-card" style="margin-top:10px">
  <div class="ic-l">违规处理的渐进原则</div>
  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:8px">
    <span class="flow-node">提醒警告</span><span class="flow-arrow">→</span>
    <span class="flow-node">功能限制</span><span class="flow-arrow">→</span>
    <span class="flow-node">降权处罚</span><span class="flow-arrow">→</span>
    <span class="flow-node">暂停经营</span><span class="flow-arrow">→</span>
    <span class="flow-node">永久封禁</span>
  </div>
</div>
<div class="pm-insight" style="margin-top:10px"><div class="pmi-label">规则透明度是核心产品能力</div><div class="pmi-text">商家最怕的不是被处罚，而是"不知道为什么被处罚"。申诉通道设计、违规原因说明、规则变更提前告知——这些"规则可读性"功能能将商家因治理导致的流失降低40%以上。</div></div>`,
    flashcards:[
      {q:'平台为什么不能一开始就采取最严格的惩罚措施？',a:'渐进原则：①减少误判代价（新商家可能是无意为之）；②给商家改正机会，提高留存；③避免大量好商家因规则理解偏差被一刀切，破坏供给侧生态。'},
      {q:'刷单行为对平台生态最大的危害是什么？',a:'核心危害：①扭曲搜索排名算法，让真实优质商品被劣质刷单商品压制；②破坏推荐系统准确性；③降低平台整体转化率——用户被诱导购买差商品后差评率上升，信任下降。'},
      {q:'数据杀熟的产品本质是什么？为什么说它是自杀行为？',a:'数据杀熟 = 用用户画像对同一商品差异定价。短期提升客单价，但一旦曝光：①用户大量流失；②监管介入罚款；③品牌声誉永久受损。长期ROI极低，是典型的以短期收益损害长期价值的决策。'},
    ],
    quiz:[
      {q:'某平台发现一批商家通过刷单提升排名，最合理的处理方式是？',opts:['A. 立即全部永久封号，零容忍','B. 渐进处理：警告→降权→封号，并完善检测机制','C. 只要销量真实就不管','D. 向被刷单受益商家收费'],ans:'B',expl:'渐进处理减少误判代价，同时给商家改正机会。关键是同步完善检测机制，形成威慑。一刀切容易误伤正常商家，破坏供给生态。'},
      {q:'申诉通道对商家侧最重要的价值是？',opts:['A. 减少客服工作量','B. 提升商家对平台规则公平性的信任，降低因治理导致的流失','C. 帮助平台了解哪些规则需要修改','D. 为违规商家提供洗白机会'],ans:'B',expl:'商家最怕"不透明"，申诉通道让商家感受到"即使犯错也有机会说明情况"，这是维持商家经营信心的核心机制之一。'},
    ],
    practice:{
      context:'某综合电商平台近期发现：①平台整体差评率上升至8%（行业均值3%）；②头部商家开始对平台合规要求表达强烈不满；③同时有媒体报道该平台存在"大数据杀熟"现象（老用户看到的价格比新用户高15%）。你是平台规则产品的PM。',
      questions:['问题1：这三个问题的优先级如何排序？请说明你的判断依据（从商业风险、用户影响、紧急程度三个维度分析）。','问题2：针对媒体曝光的"大数据杀熟"问题，你会如何设计一个产品方案来解决这个问题？同时如何在内部向业务团队解释为什么不能做杀熟？','问题3：如何设计一个"规则透明度"产品功能，让商家在被处罚时能清楚了解原因，同时让平台能持续优化规则质量？']
    }
  },

<div class="pm-insight"><div class="pmi-label">第一周核心认知升级</div><div class="pmi-text">电商PM的核心能力不是懂某一个功能，而是能同时在<strong>买家体验、商家经营、平台商业</strong>三个视角之间快速切换，找到三者利益的最大公约数。每一个产品决策都要问：这对飞轮有什么影响？</div></div>`,
    flashcards:[

  d8:{
    title:'大促活动设计',tag:'Day 8 · 第二周',

    flashcards:[
      {q:'大促活动为什么要设计"预售"环节？',a:'预售核心价值：①确认需求，商家可以按需备货，减少库存踩踏；②锁定用户，付定金用户大促当天转化率接近100%；③制造期待感，预热期用户不断刷新活跃度，带动算法推荐。'},
      {q:'大促结束后，如何评估大促的真实质量（而非只看GMV）？',a:'关键指标：①大促期间新用户的30日留存率；②大促期间购买用户vs非大促购买用户的复购率对比；③商家大促后的满意度和复投率；④退货率（高退货率说明大促冲动消费多）。'},
      {q:'为什么说"每次大促都是平台最好的数据收集机会"？',a:'大促期间用户行为最集中、最典型：①哪类商品搜索量激增→品类趋势；②哪类用户最终没有下单→流失原因分析；③哪些价格区间转化最好→定价策略；④新用户vs老用户行为差异→个性化策略优化。'},
    ],
    quiz:[
      {q:'某平台大促当天GMV同比增长50%，但大促后一个月整体GMV同比下降8%。最可能的原因是？',opts:['A. 大促太成功，用户都买完了','B. 大促提前透支了用户需求，且吸引了大量低质量价格敏感用户','C. 大促期间服务器宕机损害了用户体验','D. 竞争对手在大促后发起了更大折扣'],ans:'B',expl:'大促"借未来的GMV"——用户在大促囤货后短期内不需要再购买，且低价吸引来的价格敏感用户平常不活跃。优秀的大促设计要最大化"高价值新用户获取"而非只追GMV。'},
      {q:'大促期间应该如何分配商家资源（流量扶持）？',opts:['A. 平均分配，公平原则','B. 全部给头部品牌，最大化GMV','C. 优先腰部有增长潜力的商家，配合头部保底GMV','D. 只给付费广告商家，最大化收入'],ans:'C',expl:'头部商家有自带流量不需要过多扶持；腰部商家借助大促能实现跨越式增长，且成本更低。同时配合头部保证基础GMV。这是大促资源分配的最优策略。'},
    ],
    practice:{
      context:'你是某垂直母婴电商平台的PM，计划在6月1日儿童节前后举办首次大促活动。平台月GMV 5000万，用户规模200万，商家500家（头部20家占GMV 60%）。预期大促期间GMV翻3倍达到1.5亿。',
      questions:['问题1：设计这次大促的"预热-爆发-收尾"完整时间线，每个阶段的核心运营动作和对应的产品功能支撑是什么？','问题2：如何防止大促后的"GMV崖"（大促结束后销售额断崖式下跌）？请设计至少3个具体的产品机制。','问题3：大促期间如何平衡头部商家（占GMV 60%）和腰部商家（100-480家）的流量分配？设计一个具体的分层流量策略。']
    }
  },
  d9:{
    title:'促销工具体系',tag:'Day 9 · 第二周',
    desc:'优惠券、满减、折扣、秒杀——每种工具的适用场景、设计要点与滥用风险。',
    theory:`
<div style="margin-bottom:12px">
  <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">主流促销工具对比</div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px;display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--t1)">🎫 优惠券</div>
      <div style="font-size:11px;color:var(--t2)">定向发放，精准触达目标用户群，提升复购</div>
      <div><span class="score-tag tag-g">复购↑</span> <span class="score-tag tag-a">成本中</span></div>
    </div>
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px;display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--t1)">💰 满减</div>
      <div style="font-size:11px;color:var(--t2)">提升客单价，引导用户凑单，跨品类销售</div>
      <div><span class="score-tag" style="background:var(--bld);color:#8085f5;border-color:var(--blb)">客单价↑</span></div>
    </div>
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px;display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--t1)">⚡ 秒杀</div>
      <div style="font-size:11px;color:var(--t2)">制造稀缺感，引流获客，提升平台活跃度</div>
      <div><span class="score-tag tag-g">流量↑</span> <span class="score-tag tag-r">利润↓</span></div>
    </div>
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px;display:grid;grid-template-columns:80px 1fr 1fr;gap:8px;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--t1)">🔖 折扣</div>
      <div style="font-size:11px;color:var(--t2)">简单直接，清库存效果最好，但损害品牌调性</div>
      <div><span class="score-tag tag-a">库存↓</span> <span class="score-tag tag-r">品牌↓</span></div>
    </div>
  </div>
</div>
<div class="kp"><div class="kp-h">促销工具的核心设计原则</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>目标导向：</strong>提升客单价用满减，提升复购用优惠券，获新客用秒杀，清库存用折扣。用错工具会适得其反。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>门槛设计：</strong>满减门槛应设在"当前客单价×1.2-1.5倍"，让大多数用户感觉"再加一点就能用"，而不是遥不可及。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>频率控制：</strong>优惠券发放过频会导致用户"等券再买"，平常转化率下降。最佳频率是让用户感到"有点稀缺但不难获得"。</div></div>
</div>
<div class="pm-insight"><div class="pmi-label">促销不应该是止痛药</div><div class="pmi-text">很多PM把促销当作解决GMV下滑的快速手段。但频繁促销会训练用户价格敏感性，损害品牌价值，并形成"不促不买"的恶性循环。促销应该是战略工具，而不是救火手段。</div></div>`,
    flashcards:[
      {q:'满减活动的门槛如何设计才最有效？',a:'门槛 = 目标客单价 × 1.2-1.5。让约60-70%的用户只需再加一两件就能达到门槛。门槛太高（用户直接放弃）或太低（不需要凑单）都浪费了工具的杠杆效果。'},
      {q:'优惠券应该定向发放还是公开发放？区别是什么？',a:'定向更高效：针对高价值用户（高LTV、高复购可能性）发放，ROI更高，不浪费补贴预算。公开发放吸引大量价格敏感用户，补贴成本高但用户质量参差。通常结合使用：大促预热公开发放获新客，日常定向发放维系老客。'},
      {q:'为什么说秒杀是"双刃剑"？',a:'好处：极低价格制造话题性，大量引流；坏处：①SKU过少导致大量用户失望离开；②商家亏损，参与意愿持续降低；③吸引来的用户都是价格敏感型，正常价格时不会再买。秒杀适合引流但不适合作为日常促销工具。'},
    ],
    quiz:[
      {q:'某电商平台美妆品类客单价通常为150元，想通过满减活动提升客单价到200元，最合理的门槛设置是？',opts:['A. 满100减10','B. 满180减30','C. 满300减50','D. 满150减20'],ans:'B',expl:'满180减30：门槛在目标客单价200元附近（×0.9），让用户感觉"再加30元就能省30元"，实际是平台在150-180区间创造了凑单动力。满100太低没有提升作用，满300太高大多数用户直接放弃。'},
      {q:'以下哪个促销策略最能有效提升用户的长期复购率？',opts:['A. 每天秒杀活动','B. 全场8折','C. 个性化优惠券（根据用户购买记录定向发放）','D. 所有商品买一送一'],ans:'C',expl:'个性化优惠券命中用户真实需求，用户感受到"平台了解我"，复购意愿最强。全场折扣和秒杀吸引价格敏感型用户，对长期复购贡献有限。'},
    ],
    practice:{
      context:'你是某头部女装电商平台的促销产品PM。平台目前每周发放满100减10的通用优惠券，效果越来越差（券使用率从60%降至32%，复购率也在下降）。老板要求你重新设计促销工具体系，目标：提升30%的GMV，同时控制补贴成本。',
      questions:['问题1：当前优惠券效果下降的根本原因是什么？请从用户行为心理学的角度分析，并提出你的诊断结论。','问题2：设计一套新的促销工具组合方案，需要包含至少3种工具，说明每种工具针对哪类用户、解决什么问题、预期效果指标。','问题3：如何用数据证明新促销方案比旧方案更好？设计一个A/B测试方案，包括实验分组、测试时间、评估指标和决策标准。']
    }
  },
  d10:{
    title:'会员体系设计',tag:'Day 10 · 第二周',
    desc:'为什么会员体系是留存最强武器？从积分到分级，设计让用户上瘾的成长体系。',
    theory:`
<div style="margin-bottom:12px">
  <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">会员体系核心价值</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px">
    <div style="background:var(--gd);border:1px solid var(--gb);border-radius:10px;padding:12px">
      <div style="font-size:28px;font-weight:700;color:var(--green);line-height:1">3.8x</div>
      <div style="font-size:11px;color:var(--t2);margin-top:4px">会员用户 vs 非会员用户的LTV倍数（行业均值）</div>
    </div>
    <div style="background:var(--bld);border:1px solid var(--blb);border-radius:10px;padding:12px">
      <div style="font-size:28px;font-weight:700;color:#8085f5;line-height:1">62%</div>
      <div style="font-size:11px;color:var(--t2);margin-top:4px">高级会员升级前后的复购率提升幅度（头部平台数据）</div>
    </div>
  </div>
</div>
<div class="info-card" style="margin-bottom:10px">
  <div class="ic-l">会员分级设计原则（以4级为例）</div>
  <div style="margin-top:10px">
    <div class="score-bar-wrap"><div class="score-bar-lbl">普通会员</div><div class="score-bar-track"><div class="score-bar-fill" style="width:30%;background:var(--t4)"></div></div><span style="font-size:10px;color:var(--t3);font-weight:600">70%用户</span></div>
    <div class="score-bar-wrap"><div class="score-bar-lbl">银卡会员</div><div class="score-bar-track"><div class="score-bar-fill" style="width:55%;background:var(--blue)"></div></div><span style="font-size:10px;color:var(--blue);font-weight:600">20%用户</span></div>
    <div class="score-bar-wrap"><div class="score-bar-lbl">金卡会员</div><div class="score-bar-track"><div class="score-bar-fill" style="width:75%;background:var(--amber)"></div></div><span style="font-size:10px;color:var(--amber);font-weight:600">8%用户</span></div>
    <div class="score-bar-wrap"><div class="score-bar-lbl">黑卡会员</div><div class="score-bar-track"><div class="score-bar-fill" style="width:95%;background:var(--green)"></div></div><span style="font-size:10px;color:var(--green);font-weight:600">2%用户</span></div>
  </div>
</div>
<div class="kp"><div class="kp-h">会员体系设计的关键决策</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>付费vs免费：</strong>付费会员（如88VIP）筛选高价值用户，免费会员覆盖更多用户。付费会员ARPU是免费会员的5-10倍。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>积分体系：</strong>积分必须"稀缺但可及"——太容易获得无激励效果，太难获得让用户放弃。最佳设计是让核心用户持续感受到"快到下一级了"。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>权益设计：</strong>免邮>折扣>优先客服>专属活动。实物权益（免邮）感知最强，折扣权益感知次之，服务权益感知最弱但成本最低。</div></div>
</div>
<div class="pm-insight"><div class="pmi-label">会员体系的真正目的不是折扣</div><div class="pmi-text">顶级的会员体系（如星巴克Gold、Amazon Prime）不是在卖折扣，而是在卖<strong>"身份认同"和"归属感"</strong>。当用户认为"我是一个XX平台的黑卡会员"时，品牌已经成为他自我认同的一部分，这才是最难复制的护城河。</div></div>`,
    flashcards:[
      {q:'积分体系的"稀缺感"设计原则是什么？',a:'"快到手但还没到"是最强激励状态。设计积分门槛时，确保大约60-70%的活跃用户距离下一个目标/等级只差10-20%，这个区间用户行动意愿最强（心理学：目标接近效应）。'},
      {q:'付费会员和免费会员，PM应该优先建设哪个？',a:'取决于平台阶段：早期用免费会员积累用户量和数据；中期同时运营，用付费会员筛选高价值用户；成熟期付费会员是核心，因为付费意愿本身就是高价值用户的筛选器，且付费后用户沉没成本更高，留存率更好。'},
      {q:'如何量化评估会员体系的健康度？',a:'核心指标：①各级会员的复购率对比；②会员升级率（普通→银卡）；③会员降级率（触发留存干预）；④ARPU对比（会员vs非会员）；⑤会员续费率（付费会员）。最重要的是升级/降级的"流量"而非存量。'},
    ],
    quiz:[
      {q:'某电商平台准备推出付费会员，年费定价最合理的参考是？',opts:['A. 竞争对手定价的80%','B. 等于一次会员权益使用的价值','C. 用户平均年度权益价值的40-60%（让用户感觉"赚了"）','D. 尽可能高，筛选最高价值用户'],ans:'C',expl:'付费会员定价关键是让用户感受到"比我付的钱更值"。用户年度权益价值的40-60%是最优区间——太便宜感觉不高端，太贵用户算不回来不买。Amazon Prime的定价策略就是让大多数Prime用户感觉"一两次使用就回本了"。'},
      {q:'用户积分将要过期，最合理的产品设计是？',opts:['A. 直接清零，激励用户更活跃','B. 自动续期，提升用户好感','C. 提前N天通知+给出使用建议，保留但制造紧迫感','D. 转为现金退款'],ans:'C',expl:'提前通知+使用建议：①保留积分不清零，维持用户好感；②制造紧迫感激励使用；③给出具体使用建议降低决策成本。纯清零会引发用户反感，自动续期则丧失了激励效果。'},
    ],
    practice:{
      context:'你是某头部美妆电商的会员产品PM。当前状况：有普通会员体系但无分级，用户活跃度低，复购率只有8%，远低于行业均值15%。用户规模500万，其中月活跃用户100万，高消费用户（年消费>2000元）约5万人。',
      questions:['问题1：设计一套4级会员体系（命名、升级标准、核心权益），需要考虑每级的用户数量目标和权益成本控制。','问题2：如何设计"会员升级提醒"功能，在用户即将升级时最大化其行动意愿？从推送时机、文案逻辑、产品形态三个维度设计。','问题3：6个月后如何评估这套会员体系是否成功？设计具体的成功标准和核心评估指标（至少5个）。']
    }
  },
  d11:{
    title:'直播电商产品逻辑',tag:'Day 11 · 第二周',
    desc:'为什么直播能成为万亿GMV的新引擎？理解直播电商的产品逻辑与PM的核心工作。',
    theory:`

    <div style="background:var(--s3);border-radius:8px;padding:9px"><div style="font-size:10px;font-weight:700;color:var(--red);margin-bottom:3px">🤝 主播信任</div><div style="font-size:11px;color:var(--t2)">粉丝对主播的信任转化为购买</div></div>
  </div>
</div>
<div class="kp"><div class="kp-h">直播电商PM的核心工作</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>购物车产品：</strong>直播中商品管理、一键上链接、库存同步。延迟高就会让主播在"上链接"时手忙脚乱，直接损失转化。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>互动工具：</strong>抢购倒计时、弹幕购买展示、实时销量播报。这些都是制造"稀缺感"的产品工具。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>数据产品：</strong>主播需要实时看到转化率、在线人数趋势，才能调整话术和排品策略。延迟5分钟以上的数据对主播价值接近于零。</div></div>
</div>
<div class="pm-insight"><div class="pmi-label">直播不是替代货架，是补充需求发现</div><div class="pmi-text">直播创造了"用户不知道自己要什么"时的购买场景——类似逛街时被橱窗吸引。它不会取代搜索（已知需求），但极大扩展了电商的需求创造能力。PM要理解：直播的核心用户价值是<strong>"体验式发现"</strong>，而不只是打折买货。</div></div>`,
    flashcards:[
      {q:'直播电商和传统货架电商最本质的区别是什么？',a:'货架电商是"人找货"（已知需求）；直播电商是"货找人"（创造需求）。直播通过实时展示+稀缺制造+社交氛围，将决策时间从天压缩到分钟，本质是改变了电商的需求发现和决策链路。'},
      {q:'主播"砍价"直播的核心转化逻辑是什么？',a:'砍价直播 = 价格锚定+稀缺性+信任背书组合。先展示原价（锚定），主播"努力砍价"到低价（稀缺+信任），限时限量（紧迫感）。用户感受到的不只是便宜，而是"通过主播获得了普通人无法获得的价格"，满足了占便宜心理和社群归属感。'},
      {q:'直播间"在线人数"对PM的价值是什么？',a:'在线人数是直播内容质量的实时指标：①突然下降→内容出问题；②稳定增长→话题/商品有吸引力；③人数与转化率的关系→判断是否"热闹但不买"（流量质量差）。PM用这个数据优化推流策略和内容引导工具。'},
    ],
    quiz:[
      {q:'某直播平台发现：观看时长长的用户，购买转化率反而不如观看时长短的用户，原因最可能是？',opts:['A. 长观看用户更挑剔','B. 长观看用户主要是为了娱乐，购买意图低；短观看用户被特定商品吸引进来，意图更强','C. 算法问题导致推流给了错误用户','D. 长观看用户设备性能差导致结算失败'],ans:'B',expl:'这是直播电商的典型现象：长观看=粉丝/娱乐用户，购买意图低；短观看=被某件商品的链接/推流吸引进来的用户，购买意图很强。PM应该优化对"商品意图用户"的精准推流而非单纯追求观看时长。'},
      {q:'直播带货中，主播手动"上链接"（把商品加入购物车展示）的产品体验最重要的是什么？',opts:['A. 界面美观','B. 操作延迟<1秒，避免直播节奏被打断','C. 显示更多商品信息','D. 支持多商品同时显示'],ans:'B',expl:'直播节奏是生命线——主播说"上链接"后1秒内商品必须出现在用户界面，否则用户注意力已经转移，转化率会大幅下降。这个产品的核心指标是操作到展示的延迟，而不是功能丰富度。'},
    ],
    practice:{
      context:'某图文种草平台（类似小红书）决定进军直播电商，你是负责这个新业务的PM。平台有3000万内容创作者，但没有直播电商基础设施。目标：6个月内实现月GMV 1亿元，核心用户为一二线18-35岁女性。',
      questions:['问题1：从0到1搭建直播电商产品，最小可行版本（MVP）应该包含哪些核心功能？如何确定优先级？','问题2：如何说服平台头部内容创作者（10万粉丝+）从纯图文转向直播带货？设计一个创作者激励方案，包括利益分配和产品工具支持。','问题3：直播电商最大的风险是主播"跑路"（在平台外私下成交）。设计一个防跑路的产品机制，需要在不损害主播体验的前提下保护平台利益。']
    }
  },
  d12:{
    title:'内容化与私域',tag:'Day 12 · 第二周',
    desc:'内容电商和私域流量：为什么货架模式正在被内容模式挑战？PM如何应对？',
    theory:`
<div style="margin-bottom:12px">
  <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">三种流量模式对比</div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:11px;display:grid;grid-template-columns:70px 1fr auto;gap:8px;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--t1)">公域流量</div>
      <div style="font-size:11px;color:var(--t2)">平台统一分配，谁都可以获得，但成本越来越高</div>
      <span class="score-tag tag-r">成本↑↑</span>
    </div>
    <div style="background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:11px;display:grid;grid-template-columns:70px 1fr auto;gap:8px;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--t1)">内容流量</div>
      <div style="font-size:11px;color:var(--t2)">通过优质内容吸引用户，转化率高但需要持续投入</div>
      <span class="score-tag tag-a">转化↑</span>
    </div>
    <div style="background:var(--gd);border:1px solid var(--gb);border-radius:9px;padding:11px;display:grid;grid-template-columns:70px 1fr auto;gap:8px;align-items:center">
      <div style="font-size:11px;font-weight:700;color:var(--green)">私域流量</div>
      <div style="font-size:11px;color:var(--t2)">沉淀在品牌私域（微信群/APP），复触达成本≈0</div>
      <span class="score-tag tag-g">LTV最高</span>
    </div>
  </div>
</div>
<div class="kp"><div class="kp-h">内容电商 vs 货架电商的核心差异</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>需求创造：</strong>内容电商创造用户之前没有的购买欲望（种草）。货架电商满足用户已有的购买需求（搜索）。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>信任来源：</strong>内容电商依赖KOL/KOC的信任背书；货架电商依赖平台信用背书（评价系统、品牌认证）。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>决策路径：</strong>内容→兴趣→信任→购买（长链路）；搜索→比较→购买（短链路）。</div></div>
</div>
<div class="pm-insight"><div class="pmi-label">私域的本质是关系资产</div><div class="pmi-text">私域流量不只是一个营销渠道，而是品牌与用户之间<strong>直接关系的沉淀</strong>。当品牌能直接触达用户时，就不再受平台算法的摆布。这是为什么越来越多的品牌愿意花巨资把淘宝用户引到自己的微信群——那个群比他们在淘宝的店铺更有价值。</div></div>`,
    flashcards:[
      {q:'"内容电商"和"内容+电商"有什么区别？',a:'内容电商：内容是核心，购买是结果（小红书/抖音）。内容是获取注意力、建立信任的主要工具，购物是自然发生的。内容+电商：电商是核心，内容是装饰（传统货架增加测评内容）。前者的产品设计以内容体验为优先，后者以购物体验为优先。'},
      {q:'私域用户为什么比公域用户更有价值？',a:'私域用户：①触达成本≈0（不需要购买流量）；②信任度更高（主动加入私域说明与品牌有关系）；③LTV更高（平均是公域用户的3-5倍）；④反馈更直接（可以直接对话）。本质是：私域是关系资产，不是流量资产。'},
      {q:'PM如何帮助商家建设私域？',a:'产品工具：①"扫码入群"专属优惠（引导线上用户进私域）；②"专属客服"入口（降低私域门槛）；③"粉丝专属价"（激励用户进私域购买）；④定向消息推送（私域内精准触达）。关键是让用户感受到"进私域有明显好处"。'},
    ],
    quiz:[
      {q:'某品牌在淘宝有100万粉丝，在自己的微信私域有10万用户，哪边更有价值？',opts:['A. 淘宝100万，数量大','B. 微信私域10万，因为触达成本低且关系更紧密','C. 两者价值相同','D. 取决于品类'],ans:'B',expl:'私域10万用户的价值通常高于公域100万粉丝：①私域触达成本接近于零；②私域用户主动留下联系方式，信任度更高；③私域用户LTV平均是公域的3-5倍。数量上的差距被质量差距弥补有余。'},
      {q:'小红书上的"种草"对电商转化最重要的是什么？',opts:['A. 图片美观度','B. 达人粉丝数量','C. 内容与目标用户的相关性和真实感','D. 发布频率'],ans:'C',expl:'种草转化的核心是"目标用户认为这个内容是为自己写的"。相关性（正确品类+正确痛点）和真实感（像真实用户而非广告）是决定种草效果的两个最重要因素，远超图片美感和粉丝数量。'},
    ],
    practice:{
      context:'某传统货架型电商平台（类似早期京东）发现：①平台用户平均年龄35+，年轻用户（18-25岁）获取越来越困难；②小红书/抖音上有大量关于平台品类的种草内容，但没有引导到平台购买；③商家私下把用户引到微信群，平台失去这部分流量。',
      questions:['问题1：这个平台面临的核心问题是什么？是内容问题、用户结构问题还是流量生态问题？请做一个系统性的诊断。','问题2：如果你是这个平台的PM，设计一个"内容化改造"方案：在保留货架电商核心体验的同时，增加内容发现能力。需要说明最小可行功能集和优先级。','问题3：面对商家私域"跑流量"的问题，平台应该如何应对？是堵（禁止引流行为）还是疏（提供平台内私域工具）？请分析两种策略的利弊并给出你的建议。']
    }
  },
  d13:{
    title:'跨境电商产品',tag:'Day 13 · 第二周',
    desc:'跨境电商与国内电商的产品差异：合规、物流、支付、本地化——哪个才是最大壁垒？',
    theory:`
<div style="margin-bottom:12px">
  <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">跨境电商四大核心挑战</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
    <div style="background:var(--rd);border:1px solid rgba(226,59,74,.2);border-radius:10px;padding:12px">
      <div style="font-size:10px;font-weight:800;color:var(--red);margin-bottom:5px">⚖️ 合规风险</div>
      <div style="font-size:11px;color:var(--t2)">各国关税政策、商品进口限制、数据隐私法（GDPR）、知识产权保护</div>
    </div>
    <div style="background:var(--ad);border:1px solid rgba(236,126,0,.2);border-radius:10px;padding:12px">
      <div style="font-size:10px;font-weight:800;color:var(--amber);margin-bottom:5px">📦 物流时效</div>
      <div style="font-size:11px;color:var(--t2)">国际物流7-30天 vs 国内2天。海外仓可以缩短时效，但库存管理复杂度10倍增加</div>
    </div>
    <div style="background:var(--bld);border:1px solid var(--blb);border-radius:10px;padding:12px">
      <div style="font-size:10px;font-weight:800;color:#8085f5;margin-bottom:5px">💳 支付本土化</div>
      <div style="font-size:11px;color:var(--t2)">欧美：信用卡/PayPal；东南亚：货到付款；中东：习惯现金。没有本地支付方式= 70%用户流失</div>
    </div>
    <div style="background:var(--gd);border:1px solid var(--gb);border-radius:10px;padding:12px">
      <div style="font-size:10px;font-weight:800;color:var(--green);margin-bottom:5px">🌐 本地化体验</div>
      <div style="font-size:11px;color:var(--t2)">语言、货币、审美、购物习惯、节假日——每个市场都不同，复制粘贴中国模式会失败</div>
    </div>
  </div>
</div>
<div class="pm-insight"><div class="pmi-label">SHEIN的成功揭示了跨境电商的本质</div><div class="pmi-text">SHEIN不是把中国商品卖到海外，而是用中国的<strong>供应链速度+数据驱动</strong>服务全球市场。核心能力是：测款速度（7天从设计到上架）而非低价。这告诉我们跨境电商的真正壁垒不是价格，而是<strong>柔性供应链</strong>和<strong>数据选品能力</strong>。</div></div>`,
    flashcards:[
      {q:'跨境电商最容易被忽视但最重要的产品差异是什么？',a:'支付本地化。东南亚货到付款率超过60%，中东有大量现金偏好用户。不支持本地主流支付方式=直接放弃这部分用户。支付体验是跨境电商转化率的最大杠杆，比网站语言本地化影响更大。'},
      {q:'海外仓模式 vs 直邮模式，PM如何选择？',a:'海外仓：物流时效短（1-5天），用户体验好，转化率高；但库存风险高，积压成本大，适合高频/标品。直邮：物流时效长（7-30天），用户接受度差；但零库存风险，适合测款/长尾品。成熟跨境平台通常用海外仓跑爆款，直邮跑长尾。'},
      {q:'GDPR对跨境电商PM意味着什么？',a:'GDPR（欧盟数据保护条例）要求：①用户数据存储在欧洲或经用户明确授权；②用户有权要求删除全部数据；③数据泄露必须72小时内报告。违反罚款最高可达全球年营收的4%。PM在设计用户注册、购买记录、推荐系统时都需要考虑GDPR合规，否则进入欧洲市场会面临巨大法律风险。'},
    ],
    quiz:[
      {q:'某中国跨境电商进入东南亚市场，发现本地用户下单率极低，最可能的首要原因是？',opts:['A. 网站语言没有本地化','B. 商品价格太高','C. 缺少货到付款选项（东南亚货到付款率60%+）','D. 物流时间太长'],ans:'C',expl:'东南亚用户（尤其是二三线城市）信用卡渗透率低，大量用户只接受货到付款。缺少这个支付方式等于直接排除了60%以上的潜在用户。这是跨境PM在进入东南亚市场时最先要解决的问题。'},
      {q:'跨境电商的"本地化"最深层次的含义是？',opts:['A. 翻译成当地语言','B. 展示当地货币','C. 理解并匹配当地用户的购物习惯、文化审美和信任建立方式','D. 聘用当地员工'],ans:'C',expl:'语言和货币是基础，真正的本地化是产品设计层面的：印度用户重视议价感（所以需要划线价）；日本用户重视细节信息（商品描述要极其详细）；东南亚用户重视社交认证（评价数量比评分更重要）。'},
    ],
    practice:{
      context:'你是Temu（拼多多旗下跨境电商）的产品PM，负责进入日本市场。日本电商市场特点：①对商品品质和细节要求极高；②物流时效要求高（习惯当天/次日达）；③信用卡支付为主；④用户对新兴电商信任度低；⑤竞争对手有Amazon Japan和乐天。',
      questions:['问题1：在日本市场，Temu"低价快时尚"的定位面临什么挑战？你会如何调整产品定位和运营策略？','问题2：如何建立日本用户对Temu的信任？设计3个具体的产品功能，每个功能说明针对哪个信任障碍、如何解决。','问题3：日本用户对物流时效要求极高，但直邮需要7-15天。如何设计物流产品策略，在成本可控的前提下最大化用户体验？']
    }
  },
  d14:{

      <div style="font-size:9px;color:var(--t3);margin-top:2px">种草·私域·关系资产</div>
