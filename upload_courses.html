<div class="pm-insight"><div class="pmi-label">第二周核心认知：活动≠折扣</div><div class="pmi-text">顶级的活动营销产品，本质是在<strong>制造用户的集体记忆</strong>。双11不只是打折，它是让中国消费者每年都会参与的社会化仪式。PM要设计的不只是"促销机制"，而是"用户愿意反复参与的体验"。</div></div>`,
    flashcards:[
      {q:'哪种促销工具对提升用户LTV最有效？',a:'会员积分体系+个性化优惠券组合：积分建立长期关系（用户会为了保级而持续购买），个性化优惠券精准触达（ROI比通用优惠券高3-5倍）。二者结合能同时提升复购频次和客单价。'},
      {q:'一个完整的"留存体系"应该包含哪些产品组件？',a:'①会员分级（身份激励）；②积分体系（行为激励）；③定向优惠（精准召回）；④个性化推荐（需求匹配）；⑤私域沉淀（关系维系）。单独任何一个都不完整，五者组合才是完整的留存产品矩阵。'},
    ],
    quiz:[
      {q:'综合第二周内容：某平台计划用3个月将用户复购率从8%提升到15%，优先级最高的产品是？',opts:['A. 优化大促活动频率','B. 推出会员积分体系+个性化召回优惠券','C. 增加秒杀频率','D. 上线直播功能'],ans:'B',expl:'会员积分体系建立长期激励机制，个性化召回优惠券精准触达沉睡用户，两者组合是直接提升复购率ROI最高的产品投资。大促和直播对复购率的影响是间接的，效果也更不确定。'},
    ],
    practice:{
      context:'综合项目：你是某中型综合电商的活动营销PM。平台当前状况：月GMV 2亿，月活用户50万，会员体系缺失，主要靠大促驱动GMV，大促结束后GMV回落严重（峰谷比5:1）。老板要求：3个月内将GMV峰谷比降至2:1，同时提升月活用户质量（ARPU提升30%）。',
      questions:['问题1：大促依赖型的GMV结构有哪些深层问题？请分析"峰谷比5:1"背后反映的用户结构和商家结构问题。','问题2：设计一个完整的"用户留存产品矩阵"：包含会员体系、促销工具、私域沉淀三个层次，每个层次的产品形态、目标用户群和预期效果指标。','问题3：在改造过程中，如何避免从"大促依赖"变成"优惠券依赖"？设计一套指标监控体系，用数据预警"新的不健康依赖"的出现。']
    }
  },

  d15:{title:'需求优先级框架',tag:'Day 15 · 第三周',desc:'RICE、ICE、MoSCoW——哪个框架最适合电商PM？如何在资源有限时做出最优决策。',
    theory:`<div class="info-card" style="margin-bottom:12px"><div class="ic-l">三大优先级框架对比</div><div style="margin-top:10px;display:flex;flex-direction:column;gap:7px"><div style="background:var(--s3);border-radius:9px;padding:11px"><div style="font-size:11px;font-weight:700;color:var(--t1);margin-bottom:4px">RICE = Reach × Impact × Confidence ÷ Effort</div><div style="font-size:11px;color:var(--t2)">适合：有数据基础、多方案横向比较。优点：量化清晰。缺点：主观性依然很强（Impact怎么打分？）</div></div><div style="background:var(--gd);border:1px solid var(--gb);border-radius:9px;padding:11px"><div style="font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px">ICE = Impact × Confidence × Ease</div><div style="font-size:11px;color:var(--t2)">适合：快速评估，早期阶段。轻量但精度低。适合需要快速排序10+个需求的场景。</div></div><div style="background:var(--bld);border:1px solid var(--blb);border-radius:9px;padding:11px"><div style="font-size:11px;font-weight:700;color:#8085f5;margin-bottom:4px">MoSCoW = Must/Should/Could/Won't</div><div style="font-size:11px;color:var(--t2)">适合：版本规划，让团队快速对齐。优点：沟通简单。缺点：没有量化，容易所有人都说"Must Have"。</div></div></div></div><div class="pm-insight"><div class="pmi-label">框架是工具，不是答案</div><div class="pmi-text">所有优先级框架的本质是让主观判断更有结构地表达出来，而不是消除主观性。真正好的优先级决策需要：清晰的目标（这个季度最重要的是什么）+ 框架（结构化评估）+ 数据（验证假设）+ 对话（与业务/技术对齐）。</div></div>`,
    flashcards:[{q:'RICE评分中，Confidence（置信度）为什么最重要？',a:'Confidence是对整个评估的校正系数。一个Impact 10分但Confidence只有20%的需求，RICE分和Impact 7分Confidence 80%的需求相差悬殊。Confidence低意味着假设未经验证，风险高——而很多PM忽略这一点，导致优先级失真。'},{q:'如何区分"紧急"和"重要"的需求？',a:'重要：对核心目标（北极星指标）有显著影响。紧急：有时间窗口限制。矩阵：①重要+紧急=立即做；②重要+不紧急=规划做；③不重要+紧急=委派或评估；④不重要+不紧急=不做。电商PM最大的陷阱是把"老板今天提到的"当成"重要"。'}],
    quiz:[{q:'用RICE框架评估时，以下哪种情况最值得优先做？',opts:['A. Reach大、Impact高、Confidence低、Effort高','B. Reach中、Impact中、Confidence高、Effort低','C. Reach小、Impact极高、Confidence低、Effort低','D. Reach大、Impact低、Confidence高、Effort极高'],ans:'B',expl:'B选项：中等收益但置信度高、实现简单，RICE分高且风险低。C看起来Impact极高但置信度低+Reach小，实际分并不高。A和D的Effort太高，拉低了最终评分。不确定性高的高收益方案，应该先做小实验验证再全力投入。'},{q:'某需求被所有相关方都标记为"Must Have"，最可能的原因是？',opts:['A. 这个需求真的很重要','B. MoSCoW框架被滥用，大家没有理解"Must Have"的严格定义','C. 团队对齐做得很好','D. 产品策略非常清晰'],ans:'B',expl:'"Must Have"的严格定义是：没有这个功能，产品就无法发布/上线/使用。但实际使用中大家都倾向于把自己负责的需求标为Must Have。解决方案：重新定义标准——"如果不做这个，会导致什么具体的业务后果？"'}],
    practice:{context:'你是某中型电商App的PM，现在手头有以下需求积压：①优化搜索结果排序算法（技术复杂，预期转化率+5%）；②新增"价格历史曲线"功能（用户强烈呼声）；③修复iOS结算页闪退bug（影响1%用户，但这1%多为高价值用户）；④上线"AR试穿"功能（行业趋势，效果未验证）；⑤优化首页加载速度（慢3秒，影响全部用户）。',questions:['问题1：用RICE框架对这5个需求进行评分和排序（需要设定评分标准并逐一打分），并给出你的优先级排序结果。','问题2：如果本季度开发资源只够做2个需求，你会选哪2个？请说明你的决策逻辑，以及如何向被砍掉需求的业务方解释。','问题3："AR试穿"功能行业趋势明显但效果未验证，如何设计一个低成本的验证方案，在不占用大量开发资源的前提下验证核心假设？']},
  },
  d16:{title:'产品Roadmap设计',tag:'Day 16 · 第三周',desc:'如何把战略目标转化成可执行的产品路线图？避免Roadmap变成"功能许愿清单"。',
    theory:`<div class="kp"><div class="kp-h">好Roadmap的三个特征</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>目标驱动：</strong>每个功能都能回答"这对我们这个季度的目标有什么贡献"，而不是"因为用户要求"或"竞品有"。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>有取舍：</strong>好的Roadmap明确说"这个季度不做什么"，比说"做什么"更难但更重要。列入Roadmap=承诺资源，不能什么都要。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>可交付：</strong>每个里程碑有明确的完成标准（Definition of Done），不是"功能上线"而是"指标达到X"。</div></div></div><div class="info-card" style="margin-top:12px"><div class="ic-l">Roadmap时间维度设计</div><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:8px"><span class="flow-node" style="background:var(--rd);border-color:rgba(226,59,74,.3);color:var(--red)">0-4周 执行中</span><span class="flow-arrow">→</span><span class="flow-node" style="background:var(--ad);border-color:rgba(236,126,0,.3);color:var(--amber)">1-3月 规划中</span><span class="flow-arrow">→</span><span class="flow-node" style="background:var(--bld);border-color:var(--blb);color:#8085f5">3-6月 方向性</span><span class="flow-arrow">→</span><span class="flow-node">6月+ 愿景</span></div></div><div class="pm-insight" style="margin-top:10px"><div class="pmi-label">Roadmap是沟通工具，不只是执行计划</div><div class="pmi-text">优秀PM用Roadmap做三件事：①向上管理（让老板理解为什么这个季度做这些）；②向下对齐（让工程师/设计师理解为什么要做，而不是只知道做什么）；③横向协调（让销售/运营知道哪些功能什么时候能用）。一个好Roadmap节省的会议时间比你花在上面的时间多10倍。</div></div>`,
    flashcards:[{q:'如何避免Roadmap变成"功能许愿清单"？',a:'三个方法：①每个需求必须绑定一个季度目标（OKR/KPI），没有绑定不进Roadmap；②明确"不做什么"（反Roadmap），让取舍可见；③设定Roadmap review节奏（每4-6周），根据数据和优先级变化调整，而不是把6个月的计划写死。'},{q:'如何处理业务方临时插入的"紧急需求"？',a:'标准流程：①评估真实影响（量化，不能只说"很重要"）；②和现有规划对比优先级（做这个要推什么？）；③给出3个选项：插入（代价是X）、下一版本、不做；④让业务方做选择，而不是PM单独决定。这样既显示了专业性，也把决策责任还给了业务方。'}],
    quiz:[{q:'某PM把接下来12个月所有功能都详细规划好并锁定，这样做的最大风险是？',opts:['A. 工作量太大','B. 锁定12个月计划会让团队失去根据市场变化调整的能力，且大量假设会被证伪','C. 不能快速响应竞品动作','D. 会让用户对功能发布有太高期待'],ans:'B',expl:'12个月前的假设，到第3个月往往已经有50%以上被证伪。锁定计划会产生"沉没成本"心理，让团队不敢调整。好的Roadmap是近期详细（1-2个月），远期方向性（3-6个月），6个月以后只有愿景而没有功能清单。'},{q:'Roadmap中"方向性承诺"和"功能承诺"的区别是什么？',opts:['A. 前者模糊后者清晰','B. 前者承诺解决的问题，后者承诺具体功能——PM应该优先做前者','C. 前者针对用户后者针对内部','D. 没有实质区别'],ans:'B',expl:'功能承诺（"我们会做购物车分享功能"）会让团队过早锁定方案，而问题可能有更好的解法。方向性承诺（"我们会提升商品发现效率"）给团队留下探索空间，也更能适应信息变化。近期可以有功能承诺，远期只做方向性承诺。'}],
    practice:{context:'你刚加入某中型电商公司担任产品负责人。当前状况：没有统一的Roadmap，各业务线各自为政，开发资源经常争抢；公司今年OKR是"将用户复购率从10%提升到18%"；现在有来自不同部门的12个需求等待排期，其中至少有5个声称"非常紧急"。',questions:['问题1：如何建立一个新的Roadmap管理流程？从收集需求→评估优先级→排期→发布→复盘，设计完整的工作流程。','问题2：针对"复购率从10%到18%"这个OKR，梳理出3-5个可能的功能方向，并说明每个方向的逻辑链路（功能→用户行为变化→指标变化）。','问题3：如何处理各业务线之间的Roadmap冲突？设计一个"需求仲裁机制"，在保证决策效率的同时，让各方感觉被公平对待。']},
  },
  d17:{title:'北极星指标体系',tag:'Day 17 · 第三周',desc:'为什么一个指标能改变整个团队的行为？如何为你的产品找到正确的北极星指标。',
    theory:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div style="background:var(--bld);border:1px solid var(--blb);border-radius:11px;padding:14px"><div style="font-size:10px;font-weight:800;color:#8085f5;margin-bottom:8px">❌ 错误的北极星指标</div><div style="font-size:12px;color:var(--t2);line-height:1.8">DAU、注册用户数、页面浏览量<br>→ 这些是<strong style="color:var(--t1)">虚荣指标</strong>，可以轻易增大但不代表真实价值</div></div><div style="background:var(--gd);border:1px solid var(--gb);border-radius:11px;padding:14px"><div style="font-size:10px;font-weight:800;color:var(--green);margin-bottom:8px">✓ 正确的北极星指标</div><div style="font-size:12px;color:var(--t2);line-height:1.8">月复购订单数、有效访客GMV、活跃商家数<br>→ 反映<strong style="color:var(--t1)">真实用户价值获取</strong></div></div></div><div class="kp"><div class="kp-h">北极星指标的选择标准</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>代表核心价值：</strong>指标增长说明用户获得了他们来平台的核心价值（买到了想要的商品）。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>可分解：</strong>能拆解成团队可以行动的二级指标（北极星 = 流量×转化×质量）。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>不可博弈：</strong>不能靠刷数据、短期活动来虚假增大，团队必须通过真实改进来提升它。</div></div></div><div class="pm-insight"><div class="pmi-label">不同平台的北极星指标差异巨大</div><div class="pmi-text">淘宝：成交买家数（确保双边市场健康）。京东：准时妥投率（体现自营物流核心价值主张）。拼多多：人均购买次数（强化复购是低价之外的增长引擎）。不同的北极星指标会导致产品决策的巨大差异——这就是为什么理解竞品北极星指标比分析功能更重要。</div></div>`,
    flashcards:[{q:'什么是"虚荣指标"？为什么DAU有时也是虚荣指标？',a:'虚荣指标：好看但不代表真实价值的数字。DAU是虚荣指标的情况：如果日活用户进来只是看了看就离开，没有完成任何有价值的行为，DAU再高也没意义。活跃的定义很关键——"打开App"算活跃还是"完成一次有效浏览"算活跃？'}],
    quiz:[{q:'某电商平台选择"GMV"作为北极星指标，最大的问题是？',opts:['A. GMV太难统计','B. GMV可以通过大量低质量促销活动虚假增大，不代表平台真实健康度','C. GMV不能被分解','D. GMV增长太慢'],ans:'B',expl:'GMV可以用"促销+刷单"轻易虚假拉升，但用户体验和商家质量可能在同步恶化。更好的北极星指标是"复购GMV"或"活跃买家数"——这些指标反映了用户真实对平台的认可，而不容易被短期行为博弈。'}],
    practice:{context:'你是某母婴电商平台的首席产品官。平台团队对北极星指标争论不休：销售团队希望用GMV，运营团队希望用DAU，技术团队希望用留存率，老板希望用利润。',questions:['问题1：分析这四个候选指标各自的优缺点，以及"以这个指标为导向会导致什么团队行为"。','问题2：设计一个适合母婴电商平台的北极星指标，并说明你的选择理由和验证方法。','问题3：如何向不同部门的反对者解释为什么你选的指标更好？设计一套针对不同反对意见的回应策略。']},
  },
  d18:{title:'A/B测试方法论',tag:'Day 18 · 第三周',
    desc:'如何科学地验证你的产品假设？从实验设计到结果解读，掌握A/B测试的完整方法论。',
    theory:`
<div style="margin-bottom:14px">
  <div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">A/B测试完整流程</div>
  <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:14px">
    <span class="flow-node" style="background:var(--bld);border-color:var(--blb);color:#8085f5">明确假设</span><span class="flow-arrow">→</span>
    <span class="flow-node">确定指标</span><span class="flow-arrow">→</span>
    <span class="flow-node">计算样本量</span><span class="flow-arrow">→</span>
    <span class="flow-node">设计分流</span><span class="flow-arrow">→</span>
    <span class="flow-node">运行实验</span><span class="flow-arrow">→</span>
    <span class="flow-node" style="background:var(--gd);border-color:var(--gb);color:var(--green)">分析决策</span>
  </div>
</div>

<div class="kp"><div class="kp-h">第一步：如何正确分组（流量分流）</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>用户维度分流（推荐）：</strong>以User ID作为分流依据，哈希取模分配到实验组/对照组。同一个用户在整个实验期间始终看到同一个版本，避免体验不一致造成的数据污染。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>会话维度分流（慎用）：</strong>以Session为单位随机分流。同一用户不同次访问可能看到不同版本，会产生"用户内污染"——用户看到A版后去看B版，行为会互相影响。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>分层随机（高阶）：</strong>按地区、设备、用户价值分层后再随机，确保实验组与对照组在关键维度上分布均匀，避免实验组恰好分到更多高价值用户导致结果偏高。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>互斥实验（并发处理）：</strong>多个实验同时进行时，必须确保同一用户不会同时进入多个测试不同位置的实验，否则实验之间会互相干扰，结果无法归因。</div></div>
</div>

<div class="kp" style="margin-top:10px"><div class="kp-h">第二步：最小样本量计算</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>核心公式：</strong>n = 16 × p×(1-p) / (Δ²)，其中p是基准转化率，Δ是期望检测到的最小绝对变化量。置信水平95%（α=0.05），统计功效80%（β=0.2）。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>实际估算规律：</strong>基准转化率5%，希望检测到+1个百分点（相对提升20%），需要约5,000人/组；只想检测+0.5个百分点，则需要约20,000人/组。绝对变化越小，所需样本量越大（平方关系）。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>测试时长下限：</strong>即使样本量够了，也要至少运行2个完整业务周期（通常2周），以消除工作日/周末的周期性效应和新奇效应。</div></div>
</div>

<div class="kp" style="margin-top:10px"><div class="kp-h">第三步：如何判断实验结果是否可信</div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>p值 &lt; 0.05：</strong>在零假设成立的前提下，观察到当前结果（或更极端结果）的概率小于5%。通俗理解：如果A和B实际没差别，看到这么大差异的概率只有5%，因此有理由相信A和B确实不同。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>置信区间：</strong>比p值更有价值——区间告诉你效果的"大小范围"。例如"提升3%，95%置信区间[1.2%, 4.8%]"，说明即使考虑误差，效果下限仍有1.2%，可以放心发布。若区间包含0（如[-0.5%, 3.5%]），说明效果不确定，不应发布。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>SRM检查（样本比率失真）：</strong>实验结束后，先检查实验组与对照组的样本比例是否符合设计（如1:1）。如果实际比例偏差超过5%（如52:48），说明分流逻辑有bug，实验结果不可信，必须重做。</div></div>
<div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>分层分析验证：</strong>对总体结果显著的实验，需要分新老用户、分设备、分地区验证是否一致。若某个子群体结果方向相反，说明存在"辛普森悖论"，总体结论不可直接采用。</div></div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
  <div style="background:var(--rd);border:1px solid rgba(226,59,74,.2);border-radius:10px;padding:12px">
    <div style="font-size:9px;font-weight:800;color:var(--red);text-transform:uppercase;margin-bottom:8px">五大陷阱</div>
    <div style="font-size:11px;color:var(--t2);line-height:1.9">① 早停：看到领先就停止<br>② 新奇效应：测试期太短<br>③ 样本量不足：结论是假的<br>④ 指标选错：虚荣指标提升<br>⑤ 用户污染：实验组互相影响</div>
  </div>
  <div style="background:var(--gd);border:1px solid var(--gb);border-radius:10px;padding:12px">
    <div style="font-size:9px;font-weight:800;color:var(--green);text-transform:uppercase;margin-bottom:8px">最佳实践</div>
    <div style="font-size:11px;color:var(--t2);line-height:1.9">✓ 预注册假设再开始<br>✓ 运行至少2个业务周期<br>✓ 先做SRM检查再看结果<br>✓ 看置信区间不只看p值<br>✓ 分层分析验证一致性</div>
  </div>
</div>

<div class="pm-insight" style="margin-top:12px"><div class="pmi-label">A/B测试的本质是降低决策风险</div><div class="pmi-text">A/B测试不是为了"证明我的方案对"，而是在全量发布前用小流量验证假设，把潜在损失控制在可控范围内。一个好的PM习惯是：每一个产品决策都问"这个假设如何用数据验证"，而不是依赖直觉或权威。</div></div>
`,
    flashcards:[
      {q:'A/B测试中为什么要以User ID而不是Session作为分流单位？',a:'Session分流会导致同一用户在不同次访问中看到不同版本（A/B都看过），用户的行为会互相影响，造成"用户内污染"。User ID分流保证每个用户整个实验期间只看一个版本，行为数据干净可归因。'},
      {q:'最小样本量公式的核心变量是什么？绝对提升量减半，样本量如何变化？',a:'核心公式：n = 16×p×(1-p)/Δ²，Δ是期望检测到的最小绝对变化。Δ减半（如+1%变+0.5%），样本量变为原来的4倍（平方关系）。这就是为什么检测"微小提升"需要极大样本量。'},
      {q:'什么是SRM（样本比率失真），发现SRM该怎么办？',a:'SRM：实验结束后实验组/对照组的实际样本比例与设计比例偏差超过5%（如设计1:1但实际是52:48）。说明分流逻辑有bug，数据已污染，实验结果不可信。必须停止分析、排查分流代码并重做实验，不能在SRM数据上得出任何结论。'},
      {q:'p<0.05且实验结果显著，一定要发布吗？',a:'不一定。还需检查：①置信区间是否包含0（如[-0.5%,+3.5%]包含0说明方向不确定）；②效果大小是否有业务意义（统计显著≠业务价值足够）；③分层分析是否一致（某子群体方向相反则有辛普森悖论风险）；④是否存在负面副作用（主指标↑但其他重要指标↓）。'},
      {q:'什么是辛普森悖论？在A/B测试中如何识别？',a:'总体实验组优于对照组，但分层看某些子群体（如iOS用户）结果方向相反。原因是子群体在实验组/对照组中的比例不均等。识别方法：分层分析（新老用户、设备、地区），如果子群体结论与总体矛盾，总体结论不可直接采用，需先修复分层不均问题。'},
    ],
    quiz:[
      {q:'某实验设计：基准转化率2%，期望检测到+0.4个百分点（即2%→2.4%）。每组需要约多少样本？',opts:['A. 约1,000人/组','B. 约5,000人/组','C. 约20,000人/组','D. 约100,000人/组'],ans:'C',expl:'用估算公式：n≈16×0.02×0.98/(0.004)²≈16×0.0196/0.000016≈19,600人/组。接近C选项。绝对变化0.4个百分点时需要约2万人/组，这是大多数PM严重低估的数字。如果每天只有5000个UV，需要8+天才能收集到足够样本。'},
      {q:'实验结束后发现：实验组(10432人) vs 对照组(9568人)，设计是1:1分流。你的第一个动作是？',opts:['A. 直接看转化率差异，算p值','B. 立即停止分析，这是SRM，分流有bug，实验数据不可信','C. 实验组样本多说明效果好，直接发布','D. 把实验组抽样调整成和对照组一样多再分析'],ans:'B',expl:'实际比例52:48，设计是50:50，偏差超过5%，这是典型的SRM（样本比率失真）。说明分流逻辑有bug——某些用户被系统性地分到了实验组（可能是新用户比例不同），数据已污染。任何在此数据上得出的结论都不可信，必须先排查分流代码再重做实验。'},
      {q:'实验结果：实验组转化率3.2%，对照组2.8%，p=0.03，95%置信区间[-0.1%, +0.8%]。你的决策是？',opts:['A. p<0.05显著，发布实验组方案','B. 置信区间包含0，结果不确定，不能发布','C. 提升明显应该发布','D. 再跑一周看看'],ans:'B',expl:'置信区间[-0.1%, +0.8%]包含0，说明真实效果可能是负的（-0.1%）也可能是正的（+0.8%）——我们无法确定方向。尽管p=0.03在阈值以下，但置信区间是更直接的判断标准。这种情况通常说明样本量不够，效果区间太宽。正确做法：增大样本量继续跑，而不是现在做决策。'},
      {q:'某实验运行3天后，实验组CTR比对照组高12%，你的PM同事建议立刻停止并发布。你的回应是？',opts:['A. 同意，12%提升很显著应该快点发布','B. 拒绝。3天太短，可能是新奇效应，且样本量可能不足，必须跑完预设周期','C. 再等一天确认','D. 问工程师这12%可靠吗'],ans:'B',expl:'早停是A/B测试最常见的错误。原因：①3天覆盖不了一个完整业务周期（周末和工作日行为差异大）；②新奇效应——用户看到新版本因为好奇而点击，1-2周后会恢复正常；③统计波动——前期样本少，随机波动大，看起来"领先"可能只是噪音。必须在实验开始前设定好停止条件，中途不能随意修改。'},
      {q:'对新购物车页面做A/B测试，选哪个指标最合适作为主指标？',opts:['A. 购物车页面的PV（页面浏览量）','B. 购物车按钮的点击率（加购率）','C. 最终支付成功订单数（转化率×UV）','D. 用户在购物车页面的停留时长'],ans:'C',expl:'购物车的核心目标是促成下单，所以主指标必须是最终的转化结果——支付成功订单数。PV和停留时长是虚荣指标（高了不代表卖出去东西）；加购率是中间漏斗指标（加购≠下单）。选错主指标可能导致：加购率↑但实际下单率↓，结果仍然错误发布方案。'},
    ],
    practice:{
      context:'你负责某电商App商品详情页的A/B测试项目。计划测试：新设计将"立即购买"按钮从页面底部移到主图下方，假设能提升购买转化率。已知数据：日均访问商品详情页UV 80,000，当前购买转化率3.5%，目标检测到+0.5个百分点（即3.5%→4.0%）的提升。置信水平95%，统计功效80%。',
      questions:[
        '问题1：设计这个A/B实验的完整方案。需要包含：①如何设置分流（以什么维度、怎么分组）；②每组最少需要多少样本量（请用估算公式计算，给出计算过程）；③预计实验需要运行多少天；④主指标和副指标各选什么，理由是什么。',
        '问题2：实验运行14天后，你看到了以下数据：实验组43,126人转化率3.9%，对照组43,874人转化率3.5%，p=0.02，95%置信区间[+0.1%, +0.8%]，SRM检查比例51.7:48.3。请判断：这个实验结果是否可信？能否发布新设计？如果有问题，问题出在哪里，下一步怎么做？',
        '问题3：假设上一题的SRM问题修复后重新实验，结果显示总体购买转化率+0.4%（显著），但分层分析发现：新用户转化率提升+1.2%（显著），老用户转化率下降-0.3%（不显著）。你会如何决策？这种情况揭示了什么产品洞察？下一步如何迭代实验？'
      ]
    }
  },
d19:{title:'竞品分析框架',tag:'Day 19 · 第三周',desc:'不是比功能，是理解战略。掌握真正有价值的竞品分析方法，避免陷入"功能抄袭"陷阱。',
    theory:`<div class="kp"><div class="kp-h">竞品分析的三个层次</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>功能层（表象）：</strong>竞品有什么功能，你没有。大多数竞品分析只做到这一层，但这是最没价值的。抄功能≠抄到竞争力，功能背后的战略和执行才是核心。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>体验层（中层）：</strong>竞品的用户体验设计，交互逻辑，用户路径。这一层能发现竞品的真实产品能力和执行水准。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>战略层（深层）：</strong>竞品的目标用户、商业模式、核心价值主张、护城河建设方向。这一层能预测竞品未来的产品走向。</div></div></div><div class="pm-insight" style="margin-top:10px"><div class="pmi-label">最有价值的竞品分析问题</div><div class="pmi-text">不要问"竞品有什么功能"，要问：①竞品在解决用户的哪个核心问题（而不是我们的）？②竞品的产品决策背后有什么战略逻辑？③竞品的护城河是什么，它在用什么来维持竞争优势？④如果我是竞品的PM，接下来6个月我会做什么？</div></div>`,
    flashcards:[{q:'为什么说"功能对标竞品"是错误的竞品分析方式？',a:'功能对标只是在追赶，不是在超越。原因：①竞品功能是服务于它的战略目标，照抄功能不一定匹配你的战略；②功能上线即落后（你做完他已经迭代了）；③用户选择你而不是竞品的理由，往往不是因为功能更多，而是核心价值主张更匹配。'}],
    quiz:[{q:'分析竞品时发现对方新上线了"AR试衣间"功能，最正确的应对方式是？',opts:['A. 立即列入Roadmap做相同功能','B. 分析这个功能背后的战略意图，用户问题是什么，以及是否符合自己的战略','C. 忽略，专注自己的路线','D. 召开紧急会议决定是否跟进'],ans:'B',expl:'先分析战略意图：竞品做AR试衣间是在解决"线上不能试穿导致退货率高"的问题，还是在建立"技术壁垒"，还是在"吸引年轻用户"？不同的战略意图对你是否跟进的决策影响很大。不加思考地跟进可能会分散资源，偏离你自己的核心战略。'}],
    practice:{context:'你是某中型服装电商PM，主要竞争对手是：ZARA官方app（快时尚品牌自营）、唯品会（品牌折扣）、小红书（内容种草+购物）。本季度需要向董事会提交一份竞品分析报告，以支撑你的Roadmap决策。',questions:['问题1：对这三个竞品进行战略层面的分析——每个竞品的目标用户是谁？核心价值主张是什么？护城河在哪里？','问题2：基于竞品分析，找出你的平台的差异化机会（竞品没有充分满足的用户需求），并说明你的判断依据。','问题3：如何建立一套持续的竞品监测机制，让团队能及时感知竞品的重大变化？设计具体的监测方法和信息分发流程。']},
  },
  d20:{title:'用户调研方法',tag:'Day 20 · 第三周',desc:'用户说的和用户做的往往不同。掌握真正有效的用户调研方法，避免被"用户意见"误导。',
    theory:`<div style="margin-bottom:12px"><div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">定性 vs 定量调研</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:var(--bld);border:1px solid var(--blb);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:800;color:#8085f5;margin-bottom:6px">定性调研（探索型）</div><div style="font-size:11px;color:var(--t2);line-height:1.7">深度访谈、用户观察、可用性测试<br>回答：<strong style="color:var(--t1)">为什么</strong>用户这样做<br>样本量：5-20人</div></div><div style="background:var(--gd);border:1px solid var(--gb);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:800;color:var(--green);margin-bottom:6px">定量调研（验证型）</div><div style="font-size:11px;color:var(--t2);line-height:1.7">问卷调查、埋点数据、A/B测试<br>回答：<strong style="color:var(--t1)">有多少</strong>用户这样做<br>样本量：1000+</div></div></div></div><div class="kp"><div class="kp-h">用户访谈的黄金法则</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>不要问"你会用X功能吗"：</strong>用户总是说"会"，但实际行为完全不同。要问过去发生的具体事件："上一次你想买X时，你是怎么做的？"</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>不要问"你想要什么"：</strong>用户给你功能列表，不是用户洞察。要问"现在最难做的事情是什么"，再从中提炼产品机会。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>5-Why法：</strong>用户说"结算太麻烦"→Why？"找不到优惠券"→Why？"券放在设置里"→Why？"设计师觉得不应该放首页"→找到了真正的问题。</div></div></div>`,
    flashcards:[{q:'为什么用户说"很好用"，PM却不应该满意？',a:'用户表达满意有多种原因：①礼貌性回答；②不知道有更好的替代方案；③对现状已经习以为常（适应性）。真正有价值的调研应该探索：用户在哪些场景下放弃了使用？用户完成任务的最大阻碍是什么？这些问题比"好不好用"更能揭示产品问题。'}],
    quiz:[{q:'以下哪个调研问题最能帮助PM理解用户的真实痛点？',opts:['A. 你对现有功能满意吗（1-5分）','B. 你希望我们增加什么新功能','C. 请描述你上次想完成XX任务时，最让你沮丧的一步是什么','D. 你多久使用一次我们的产品'],ans:'C',expl:'C问题聚焦在具体的过去事件和情绪（沮丧=负面体验），能挖掘出真实的痛点场景。A是评分（没有细节）；B让用户做PM的工作（他们给的通常是症状而非根因）；D只有频率数据（没有质量信息）。'}],
    practice:{context:'你即将对"购物车放弃率高达65%"这一问题做用户调研，需要在1周内完成并给出改进方案。资源有限：可以组织5次深度访谈（60分钟/次），可以发出一份问卷（预计200份回收），可以使用平台埋点数据。',questions:['问题1：设计5次深度访谈的提纲，包括核心问题列表（至少8个问题），并说明每个问题的设计意图和期望挖掘的信息。','问题2：设计一份购物车放弃行为的问卷，选择5个最关键的问题，并说明你为什么选这5个而不是其他问题。','问题3：如何将访谈结论（定性）、问卷数据（定量）和埋点行为数据（行为）三类数据结合起来形成一个统一的洞察？设计你的分析框架。']},
  },
  d21:{title:'第三周复习 · 综合项目',tag:'Day 21 · 第三周',desc:'整合第三周产品视野知识，完成完整的产品战略分析与决策。',
    theory:`<div style="margin-bottom:14px"><div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">第三周知识体系回顾</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"><div style="background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;margin-bottom:4px">⚖️</div><div style="font-size:11px;font-weight:700;color:var(--t1)">D15 需求优先级</div><div style="font-size:9px;color:var(--t3);margin-top:2px">RICE·ICE·MoSCoW</div></div><div style="background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;margin-bottom:4px">🗺️</div><div style="font-size:11px;font-weight:700;color:var(--t1)">D16 Roadmap</div><div style="font-size:9px;color:var(--t3);margin-top:2px">目标驱动·有取舍</div></div><div style="background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;margin-bottom:4px">⭐</div><div style="font-size:11px;font-weight:700;color:var(--t1)">D17 北极星指标</div><div style="font-size:9px;color:var(--t3);margin-top:2px">真实价值·不可博弈</div></div><div style="background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;margin-bottom:4px">🧪</div><div style="font-size:11px;font-weight:700;color:var(--t1)">D18 A/B测试</div><div style="font-size:9px;color:var(--t3);margin-top:2px">科学验证·避免陷阱</div></div><div style="background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;margin-bottom:4px">🔭</div><div style="font-size:11px;font-weight:700;color:var(--t1)">D19 竞品分析</div><div style="font-size:9px;color:var(--t3);margin-top:2px">战略层·不只是功能</div></div><div style="background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:10px;text-align:center"><div style="font-size:14px;margin-bottom:4px">👥</div><div style="font-size:11px;font-weight:700;color:var(--t1)">D20 用户调研</div><div style="font-size:9px;color:var(--t3);margin-top:2px">定性+定量·5-Why法</div></div></div></div><div class="pm-insight"><div class="pmi-label">第三周核心升级：从执行者到决策者</div><div class="pmi-text">第一、二周训练的是"如何理解和改进产品"，第三周训练的是"如何做正确的产品决策"。最大的认知升级是：<strong>好的决策不是找到最好的方案，而是在不确定的信息下做出最合理的取舍，并能清晰地向所有人解释为什么。</strong></div></div>`,
    flashcards:[{q:'从第三周的学习中，哪一个框架/方法论最能改变PM的日常工作方式？',a:'A/B测试思维：不是"我认为这个方案好"，而是"我假设这个方案会提升X指标Y%，我们来验证"。把每一个产品决策变成一个可验证的假设，是从资历型PM到数据驱动PM最核心的转变。'}],
    quiz:[{q:'综合三周的学习：一个优秀的电商PM最核心的能力组合是？',opts:['A. 懂技术+会画原型+能写PRD','B. 用户洞察+数据分析+跨团队推动+战略思考','C. 熟悉竞品+能做大促活动','D. 会用各种产品工具和框架'],ans:'B',expl:'B描述的是PM的四大核心能力：理解用户（洞察）+理解数据（分析）+实现产品（推动）+理解方向（战略）。技术/画图/写文档是手段，这四个能力才是真正的竞争力。'}],
    practice:{context:'综合项目：你被任命为某新兴生鲜电商的产品负责人。平台现状：月GMV 8000万，月活50万，复购率12%，NPS 35（偏低）。主要问题：用户投诉"配送时间不准确"和"商品与描述不符"，导致大量一次性用户。你有6个月时间，核心目标：NPS提升到55，复购率提升到20%。',questions:['问题1：用你在第三周学到的所有工具（北极星指标选择、RICE优先级、A/B测试、竞品分析、用户调研），设计一个完整的6个月产品规划。','问题2：如何用数据验证你的规划是否走在正确的方向上？设计一套"早期预警"指标体系，让你在3个月时就能判断6个月目标能否实现。','问题3：如何组织你的团队（假设你有5个PM）分工协作，最大化这6个月的产出？设计团队分工方案和协作机制。']},
  },
  d22:{title:'完整PRD写作',tag:'Day 22 · 第四周',desc:'PRD不是产品说明书，是推动产品落地的沟通工具。学会写让工程师和设计师真正理解的PRD。',
    theory:`<div class="kp"><div class="kp-h">PRD的核心结构（电商场景）</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>问题陈述（1页）：</strong>我们发现了什么问题？数据证明？影响多少用户？不解决的后果是什么？这是整个PRD的"为什么"，也是最重要的部分。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>方案概述：</strong>我们要做什么？一句话描述（如"增加购物车挽回弹窗，在用户即将离开时展示相关推荐和优惠"）。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>功能详述+交互说明：</strong>每个功能点的具体行为描述，包括边界情况和异常处理。这部分是为工程师写的。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>成功标准：</strong>上线后如何判断是否成功？具体指标和目标值。这部分是为PM自己写的，上线后要接受数据检验。</div></div></div><div class="pm-insight"><div class="pmi-label">PRD最容易被忽略的部分</div><div class="pmi-text">"不做什么"（Out of Scope）。明确说明哪些功能不在本次范围内，能防止需求蔓延（scope creep）——开发过程中不断加功能导致延期是项目失败的头号原因。每个PRD都应该有一个醒目的"本次不包含"列表。</div></div>`,
    flashcards:[{q:'PRD中最容易被工程师忽视但最重要的部分是什么？',a:'边界情况（Edge Cases）和异常处理。例如：优惠券失效时怎么显示？库存为0时购物车如何处理？用户网络断了支付中途怎么办？这些场景占代码量的70%，但PM经常只描述Happy Path（正常流程），导致开发过程中不断返工。'}],
    quiz:[{q:'以下哪种PRD写法更好？',opts:['A. 增加一个购物车按钮','B. 用户点击加入购物车后按钮变灰色，图标数字+1，2秒内显示toast提示已加入，3秒后消失（完整行为描述）','C. 参考竞品的购物车设计','D. 实现购物车功能，具体细节开发自己决定'],ans:'B',expl:'B描述了：触发条件（点击）、状态变化（按钮样式）、副作用（计数更新）、反馈时机（2秒内）、反馈内容（toast）、消失时机（3秒）。每个细节都明确，工程师无需猜测，减少来回确认的时间成本。'}],
    practice:{context:'你需要为"搜索历史智能清理"功能写一份PRD。背景：用户调研发现35%的用户认为搜索历史"太多太杂"，导致搜索框体验差。平台搜索日活50万，平均每人有28条历史记录，其中有效记录（近30天内搜索）只占40%。',questions:['问题1：写出这个功能的完整问题陈述（包括：发现了什么问题、数据支撑、影响范围、不解决的后果）。','问题2：写出核心功能的功能详述，需要覆盖至少3个边界情况（如：用户手动删除的历史能否恢复？离线状态下如何处理？）。','问题3：如何设计这个功能的成功标准？写出具体的上线后评估指标、目标值、测试方案和决策节点（如果指标不好，什么时候回滚？）。']},
  },
  d23:{title:'跨团队协作技巧',tag:'Day 23 · 第四周',desc:'PM是"没有权力的责任人"。如何在没有汇报关系的情况下，推动工程师、设计师、运营协同工作。',
    theory:`<div style="margin-bottom:12px"><div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">PM的影响力来源</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px"><div style="background:var(--gd);border:1px solid var(--gb);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:800;color:var(--green);margin-bottom:5px">✓ 有效影响力来源</div><div style="font-size:11px;color:var(--t2);line-height:1.7">数据和事实、清晰的目标、帮别人解决问题、建立信任关系、展示专业能力</div></div><div style="background:var(--rd);border:1px solid rgba(226,59,74,.2);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:800;color:var(--red);margin-bottom:5px">✗ 无效影响力来源</div><div style="font-size:11px;color:var(--t2);line-height:1.7">老板授权（用完即失）、职位权威（适得其反）、情感施压（损害关系）</div></div></div></div><div class="kp"><div class="kp-h">三种最常见的跨团队冲突和解法</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>PM vs 工程师（工期分歧）：</strong>PM说"很简单"，工程师说"很复杂"。解法：要求工程师拆解任务清单，共同评估每个子任务的难度，找到可以砍掉的非关键功能。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>PM vs 运营（需求优先级）：</strong>运营要的功能PM认为不重要。解法：数据说话——运营需要提供"这个功能能带来多少GMV/用户"的量化预估，PM用RICE评估，一起决策。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>PM vs 设计（方案分歧）：</strong>设计师认为PM的方案不符合用户体验。解法：用A/B测试来验证，而不是争论谁对谁错——这是最有效的冲突消解工具。</div></div></div>`,
    flashcards:[{q:'如何处理"工程师说需要3个月，PM希望1个月"的冲突？',a:'三步法：①让工程师拆解任务清单，每个子任务独立评估；②用MoSCoW分类哪些是MVP必须有，哪些可以砍；③提出"先做MVP版本上线，迭代完善"的分期方案。关键是把"时间分歧"变成"范围讨论"，这样双方都有退路。'}],
    quiz:[{q:'PM在没有管理权限的情况下，最有效的推动方式是？',opts:['A. 用老板施压','B. 频繁催促和提醒','C. 让团队理解为什么要做这件事，以及它对各方的价值','D. 详细列出对方的工作清单'],ans:'C',expl:'"Why"比"What"更能驱动行动。当工程师/设计师理解这个功能对用户的真实价值，他们会主动解决问题；但如果只知道"PM要做这个"，执行时就只是"完成任务"而非"解决问题"，质量大打折扣。'}],
    practice:{context:'你负责的"搜索优化"项目遇到了三个阻力：①前端工程师说搜索框重构需要6周，但老板要求3周上线；②设计师坚持认为你的交互方案"不够优雅"，反复修改耗时2周；③运营团队临时插入一个"大促搜索词热榜"需求，声称是"最高优先级"。',questions:['问题1：针对工期压缩问题，设计一个具体的谈判策略：如何在不伤害工程师关系的前提下，找到3周上线的可行路径？','问题2：如何处理设计师的方案分歧？设计一个让双方都能接受的解决方案，同时确保项目不再延期。','问题3：如何应对运营团队的临时需求插入？设计一套标准的"临时需求处理SOP"，既能让运营感觉被重视，又保护了你的项目进度。']},
  },
  d24:{title:'数据复盘方法',tag:'Day 24 · 第四周',desc:'上线不是终点，复盘才是。如何做一次真正有价值的数据复盘，而不是"总结经验教训"的形式主义。',
    theory:`<div class="info-card" style="margin-bottom:12px"><div class="ic-l">有效复盘 vs 无效复盘</div><div style="margin-top:10px;display:flex;flex-direction:column;gap:6px"><div style="background:var(--rd);border-radius:8px;padding:10px;font-size:12px;color:var(--t2)"><strong style="color:var(--red)">✗ 无效复盘：</strong>罗列数据 → 说"达到/未达到目标" → 写几条"经验教训" → 结束。下次做同样的错误。</div><div style="background:var(--gd);border-radius:8px;padding:10px;font-size:12px;color:var(--t2)"><strong style="color:var(--green)">✓ 有效复盘：</strong>数据 → 根因分析（为什么达到/未达到）→ 系统性学习（下次怎么设计不同）→ 形成可复用的决策框架。</div></div></div><div class="kp"><div class="kp-h">复盘的五步法</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>Step 1 — 目标vs结果：</strong>当初预期X，实际结果Y，差异D。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>Step 2 — 根因分析：</strong>用5-Why找到产生差异的深层原因，不停留在"执行不好"这种表面答案。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>Step 3 — 假设验证：</strong>当初做的哪些假设被证明是错的？这些错误假设来自什么？</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>Step 4 — 系统学习：</strong>这次学到的东西如何改变我下次做类似决策时的方式？</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>Step 5 — 行动项：</strong>基于复盘的具体改变，有负责人和截止日期，而不是"以后注意"。</div></div></div>`,
    flashcards:[{q:'为什么"达到目标"的复盘比"未达到目标"的复盘更难做？',a:'"成功"往往是多个因素的组合，很难分清是因为决策好还是运气好。如果不做成功的复盘，下次可能重复的是运气而不是可复制的方法。最危险的状态是：某次大促成功了但不知道为什么→下次依样画葫芦→发现不灵了→不知道原因。'}],
    quiz:[{q:'复盘结束后，最重要的产出是什么？',opts:['A. 一份详细的PPT报告','B. 对团队的表扬或批评','C. 有明确负责人和截止日期的行动项，以及可复用的决策框架','D. 给老板的汇报材料'],ans:'C',expl:'没有行动项的复盘=形式主义。复盘的价值在于改变下一次的行为，而不是记录这一次的历史。行动项要有：具体改变是什么、谁负责、什么时候完成、如何验证改变了。'}],
    practice:{context:'你负责的双11大促刚刚结束。结果：GMV达到目标的115%（超额完成），但用户NPS大促后下降了8分，退货率为18%（历史最高），大促期间服务器出现2次宕机（总计45分钟不可用）。',questions:['问题1：这次大促是成功还是失败？请给出你的判断依据，以及如何向不同利益方（老板/运营/技术）分别呈现这个结果。','问题2：用5-Why法分析"退货率18%（历史最高）"的根本原因，找到可以系统性改进的产品/运营环节。','问题3：设计这次大促的完整复盘文档结构（不用写内容，给出一级标题和每节的核心问题），以及复盘后的3个最重要行动项（每个行动项需要：具体内容、负责人、完成时间、验证方式）。']},
  },
  d25:{title:'增长黑客思维',tag:'Day 25 · 第四周',desc:'增长不只是投广告。理解增长飞轮、病毒系数和低成本获客——电商PM的增长思维工具箱。',
    theory:`<div class="info-card" style="margin-bottom:12px"><div class="ic-l">增长黑客的核心公式</div><div style="margin-top:10px"><div style="font-size:13px;color:var(--t2);line-height:1.8;text-align:center"><strong style="color:var(--t1);font-size:15px">新用户 = 现有用户 × 病毒系数K</strong><br><span style="font-size:11px">K > 1 = 病毒式增长 | K = 1 = 平衡 | K < 1 = 需要持续购买流量</span></div></div></div><div class="kp"><div class="kp-h">电商增长的三大杠杆</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>病毒增长：</strong>拼多多砍一刀（K>1的经典案例）——每个用户带来0.3-0.5个新用户，边际获客成本接近于零。设计关键：分享有明确价值，被邀请者有强激励。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>内容增长：</strong>小红书用UGC内容驱动搜索流量——用户生产内容→SEO曝光→新用户发现→成为内容生产者。飞轮建立后边际成本极低。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>产品增长（PLG）：</strong>产品本身是最好的销售工具。用户用产品→感受到价值→自然推荐→带来新用户。关键是"aha moment"（顿悟时刻）尽可能早出现。</div></div></div><div class="pm-insight"><div class="pmi-label">增长黑客的核心是找杠杆点</div><div class="pmi-text">不是所有环节都值得优化。增长黑客的思维是找到增长漏斗中"改善10%带来最大收益"的那个点，集中资源猛攻这一个点，而不是平均分配资源全面优化。这和你在GMV模型中学到的"杠杆ROI"思维是一致的。</div></div>`,
    flashcards:[{q:'"aha moment"（顿悟时刻）在电商产品中是什么？',a:'aha moment = 用户第一次真正感受到产品核心价值的那个瞬间。电商中通常是：第一次购买成功且按时收到好货→"哦这个平台真的靠谱"。优化aha moment的产品策略：缩短从注册到第一次成功购买的路径，在这个路径上减少每一个摩擦点。'}],
    quiz:[{q:'某电商平台设计了"邀请好友得优惠券"活动，发现邀请率很高但被邀请者的转化率极低，原因最可能是？',opts:['A. 优惠券面额太小','B. 被邀请者对电商不感兴趣','C. 邀请动机是获得优惠券而非真实推荐，被邀请者感受不到平台价值','D. 邀请流程太复杂'],ans:'C',expl:'当邀请行为是利益驱动而非价值驱动时，被邀请者接收到的是"我朋友为了薅羊毛把我也拉进来了"而不是"我朋友真的觉得这个平台好"。社交推荐的核心价值是信任传递，而不是利益传递。解决方案：先让用户感受到产品价值，再激励分享。'}],
    practice:{context:'某垂直宠物电商，月GMV 2000万，月新用户2万。当前主要获客方式：信息流广告（占85%），CAC为180元，LTV为520元，LTV/CAC=2.9（健康，但增长乏力）。老板要求半年内将新用户数提升至每月5万，且不增加广告预算。',questions:['问题1：在不增加广告预算的前提下，将新用户从2万提升到5万，有哪些可行的增长策略？请列出至少3种，并分析每种策略的适用条件和预期效果。','问题2：宠物品类天然适合UGC内容（用户分享宠物照片/视频），如何设计一个"内容增长飞轮"，让UGC内容成为持续获客的引擎？','问题3：为这个增长计划设计一个6个月的执行路线图，包括每个月的核心增长实验、验证指标和决策节点（如果数据不达标，如何调整策略）。']},
  },
  d26:{title:'商业模式画布',tag:'Day 26 · 第四周',desc:'用商业模式画布分析电商平台：从价值主张到收入来源，理解产品决策背后的商业逻辑。',
    theory:`<div class="info-card" style="margin-bottom:12px"><div class="ic-l">电商平台商业模式画布九宫格</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px"><div style="background:var(--bld);border:1px solid var(--blb);border-radius:8px;padding:9px"><div style="font-size:9px;font-weight:800;color:#8085f5;margin-bottom:4px">核心伙伴</div><div style="font-size:11px;color:var(--t2)">商家生态、物流服务商、支付伙伴</div></div><div style="background:var(--s3);border:1px solid var(--bd);border-radius:8px;padding:9px"><div style="font-size:9px;font-weight:800;color:var(--t3);margin-bottom:4px">核心活动</div><div style="font-size:11px;color:var(--t2)">平台运营、算法优化、治理规则</div></div><div style="background:var(--gd);border:1px solid var(--gb);border-radius:8px;padding:9px"><div style="font-size:9px;font-weight:800;color:var(--green);margin-bottom:4px">价值主张</div><div style="font-size:11px;color:var(--t2)">买家：海量选择+信任；商家：流量+工具</div></div><div style="background:var(--ad);border:1px solid rgba(236,126,0,.25);border-radius:8px;padding:9px"><div style="font-size:9px;font-weight:800;color:var(--amber);margin-bottom:4px">客户关系</div><div style="font-size:11px;color:var(--t2)">个性化推荐、会员体系、客服</div></div><div style="background:var(--s3);border:1px solid var(--bd);border-radius:8px;padding:9px"><div style="font-size:9px;font-weight:800;color:var(--t3);margin-bottom:4px">客户细分</div><div style="font-size:11px;color:var(--t2)">买家（终端消费者）+ 商家（供给侧）</div></div><div style="background:var(--rd);border:1px solid rgba(226,59,74,.2);border-radius:8px;padding:9px"><div style="font-size:9px;font-weight:800;color:var(--red);margin-bottom:4px">成本结构</div><div style="font-size:11px;color:var(--t2)">服务器、物流补贴、获客、运营成本</div></div><div style="background:var(--gd);border:1px solid var(--gb);border-radius:8px;padding:9px;grid-column:span 3"><div style="font-size:9px;font-weight:800;color:var(--green);margin-bottom:4px">收入来源</div><div style="font-size:11px;color:var(--t2)">广告费（直通车）40-60% + 佣金20-30% + 增值服务10-20% + 金融服务5-10%</div></div></div></div><div class="pm-insight"><div class="pmi-label">PM理解商业模式的意义</div><div class="pmi-text">每一个产品功能都会影响商业模式的某个模块。例如：推出免广告版本（影响收入来源）；增加商家工具（影响价值主张和客户关系）；上线即时配送（影响成本结构）。PM理解商业模式，才能预判产品决策的商业后果，而不只是看功能好不好用。</div></div>`,
    flashcards:[{q:'为什么广告费是电商平台的主要收入而不是商品销售佣金？',a:'广告的边际成本接近于零（展示一个广告vs展示一百个广告成本差别不大），而佣金受制于GMV规模有天花板。广告收入随商家竞争激烈程度自动调节（竞争越激烈，出价越高），这种自适应定价让广告收入可以持续增长，而佣金率则有被迫降低的压力（商家抱怨成本高）。'}],
    quiz:[{q:'电商平台推出"金融服务"（消费贷款/分期付款）的商业逻辑是什么？',opts:['A. 增加服务多样性','B. 用户需要贷款功能','C. 利用平台数据优势降低风险定价，提高客单价，并获得远高于广告的利润率','D. 跟上竞品功能'],ans:'C',expl:'平台有大量用户购买行为数据，能比银行更准确地评估还款能力，因此可以以更低风险提供贷款。消费贷款能将客单价提升30-50%，而利息收益远高于广告（金融服务净利润率50%+ vs 广告20-30%）。这就是为什么所有大型电商平台都在做金融服务。'}],
    practice:{context:'你是某垂直家电电商（类似苏宁）的战略产品PM，正在分析：当前收入90%来自商品销售佣金，广告收入仅占5%。竞争对手（京东/天猫）广告收入占比达40-50%。老板要求你提出一个"收入多元化"的产品战略。',questions:['问题1：用商业模式画布分析当前平台的商业模式，指出主要的战略弱点。','问题2：设计一个"广告产品从5%提升到25%"的产品路线图，包括需要建设的产品基础设施（数据、工具、系统）和关键里程碑。','问题3：除了广告，还有哪2-3个收入来源适合家电电商平台？每种收入来源的产品实现路径是什么？']},
  },
  d27:{title:'电商PM职业路径',tag:'Day 27 · 第四周',desc:'电商PM如何成长？从初级到高级，从执行者到决策者，这条路上最关键的转折点在哪里？',
    theory:`<div style="margin-bottom:12px"><div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">PM成长阶梯</div><div style="display:flex;flex-direction:column;gap:6px"><div style="background:var(--s3);border:1px solid var(--bd);border-radius:10px;padding:12px;display:grid;grid-template-columns:80px 1fr;gap:10px"><div style="font-size:11px;font-weight:700;color:var(--t3)">初级PM<br>（0-2年）</div><div style="font-size:11px;color:var(--t2)">执行功能迭代，写PRD，协调开发设计，数据分析基础。核心能力：<strong style="color:var(--t1)">把想法变成可执行的产品</strong></div></div><div style="background:var(--bld);border:1px solid var(--blb);border-radius:10px;padding:12px;display:grid;grid-template-columns:80px 1fr;gap:10px"><div style="font-size:11px;font-weight:700;color:#8085f5">中级PM<br>（2-5年）</div><div style="font-size:11px;color:var(--t2)">负责完整产品线，有优先级判断，能独立推动跨团队项目。核心能力：<strong style="color:var(--t1)">在约束下做正确的取舍</strong></div></div><div style="background:var(--gd);border:1px solid var(--gb);border-radius:10px;padding:12px;display:grid;grid-template-columns:80px 1fr;gap:10px"><div style="font-size:11px;font-weight:700;color:var(--green)">高级PM<br>（5年+）</div><div style="font-size:11px;color:var(--t2)">负责产品战略，培养团队，影响公司方向。核心能力：<strong style="color:var(--t1)">定义正确的问题</strong></div></div></div></div><div class="pm-insight"><div class="pmi-label">电商PM最有价值的差异化能力</div><div class="pmi-text">不是会某个工具或框架（这些可以快速学习），而是：①<strong>数据敏感度</strong>——看到一个指标就能快速推断背后发生了什么；②<strong>用户同理心</strong>——在没有调研数据时也能准确预测用户行为；③<strong>商业判断力</strong>——每个产品决策都能说清楚商业价值，而不只是用户价值。</div></div>`,
    flashcards:[{q:'从初级到中级PM，最关键的能力跃升是什么？',a:'从"执行者"到"问题定义者"。初级PM：给我一个方案，我来实现它。中级PM：我来判断哪个问题值得解决，并设计解决方案。这个跃升的核心是：敢于质疑"为什么要做这件事"，而不是直接问"怎么做"。'}],
    quiz:[{q:'以下哪个行为表明一个PM已经从"初级"迈向了"中级"？',opts:['A. 能写出详细的PRD','B. 主动提出"这个需求我们不应该做，因为..."并能说服老板','C. 熟悉竞品的所有功能','D. 能快速响应老板的要求'],ans:'B',expl:'"不做"比"做"更难，因为需要对优先级有清晰判断，并有勇气和能力说服利益相关方。这种能力代表PM已经能独立判断价值，而不是依赖别人的指令。会说"不"的PM，才是真正有产品判断力的PM。'}],
    practice:{context:'你在一家中型电商公司做了2年初级PM，现在想晋升为中级PM。你的年终晋升汇报需要在15分钟内说服VP：你已经具备中级PM的能力，并且未来一年有清晰的成长计划。',questions:['问题1：从这30天课程的学习中，找出3-5个你认为最重要的产品认知升级，说明它们如何改变了你对"做好产品"的理解。','问题2：设计你未来6个月的个人成长计划：目标能力、学习路径、实践项目、验证方式。','问题3：假设你面试一家新电商公司，面试官问"你的产品判断力在哪些具体决策中体现出来了"，如何用STAR法（情境-任务-行动-结果）讲述一个最有说服力的故事？']},
  },
  d28:{title:'模拟面试实战',tag:'Day 28 · 第四周',desc:'大厂电商PM面试全攻略：从产品分析题到Case Study，掌握面试官真正在考察什么。',
    theory:`<div class="kp"><div class="kp-h">电商PM面试常见题型</div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>产品分析题：</strong>"某功能数据下降了，如何分析？"。考察：数据诊断思维、漏斗分析、根因推导。框架：外部因素→内部因素→分层拆解→优先级验证。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>产品设计题：</strong>"设计一个XXX功能"。考察：用户理解、需求拆解、方案取舍、数据意识。框架：目标用户→核心场景→解决方案→成功指标。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>商业分析题：</strong>"如果你是XX平台的PM，如何提升GMV？"。考察：商业思维、全局视野、优先级判断。框架：现状诊断→杠杆分析→方案设计→资源估算。</div></div><div class="kp-r"><div class="kpdot"></div><div class="kptx"><strong>行为题：</strong>"说一次你推动了一个困难项目的经历"。考察：沟通能力、影响力、抗压性。框架：STAR法（情境-任务-行动-结果）。</div></div></div><div class="pm-insight"><div class="pmi-label">面试中最常被忽略的加分点</div><div class="pmi-text">在产品设计题中主动提出"我有几个假设，让我先验证一下..."——这比直接给出方案更能展现PM思维。好的PM不是立刻给答案，而是先确认问题边界，再提出假设，再设计验证。这个过程本身就是在展示你的产品思维，而不只是知识积累。</div></div>`,
    flashcards:[{q:'面试中遇到"如何提升XX平台的GMV"这种开放题，第一步应该做什么？',a:'第一步：确认前提假设。"我想先了解一下当前的情况——是特定品类还是整体GMV？主要是新用户获取问题还是老用户留存问题？有没有数据可以先看一下？"这样做的目的：①展示结构化思维；②避免方向跑偏；③表现出数据驱动的习惯。面试官看到你先问问题，会认为这个候选人懂得如何真正分析问题。'}],
    quiz:[{q:'面试时面试官说"你的方案听起来不错，但如果资源有限只能做一件事呢？"，最好的应对方式是？',opts:['A. 坚持说需要做所有功能','B. 随机选一个','C. 说明选择标准（ROI最高/风险最低/最能验证核心假设），然后选择并解释','D. 问面试官应该选哪个'],ans:'C',expl:'面试官在考察优先级判断能力，而不是答案本身。C展示了：你有判断框架，能清晰解释为什么选这个而不是那个。说明标准比直接给答案更重要——这才是PM日常工作中真正面对的情况：资源永远不够，必须有原则地做取舍。'}],
    practice:{context:'模拟面试：请用25分钟完成以下三道电商PM面试题（每题8分钟）。',questions:['面试题1（产品分析）：某电商App最近7天搜索页面的用户停留时长增加了40%，但搜索后的购买转化率反而下降了15%。请分析可能的原因，并提出验证和改进方案。','面试题2（产品设计）：请为一个月活50万的垂直宠物电商App，设计一个"宠物健康档案"功能，要求能提升用户粘性和复购率。','面试题3（商业分析）：假设你是微信支付团队的PM，微信刚刚想进入电商领域（对标淘宝），你会如何利用微信的现有优势，设计进入电商市场的策略？']},
  },
  d29:{title:'30天知识大复习',tag:'Day 29 · 冲刺',desc:'用思维导图串联30天所有知识点，构建完整的电商PM知识体系，为最终测评做准备。',
    theory:`<div style="margin-bottom:14px"><div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">30天知识全景图</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:var(--bld);border:1px solid var(--blb);border-radius:11px;padding:14px"><div style="font-size:10px;font-weight:800;color:#8085f5;margin-bottom:8px">🌀 第一周 — 基础认知</div><div style="font-size:11px;color:var(--t2);line-height:1.9">双边市场飞轮 · GMV四杠杆<br>用户购物旅程六阶段 · 搜索vs推荐<br>商家产品逻辑 · 平台治理规则</div></div><div style="background:var(--ad);border:1px solid rgba(236,126,0,.25);border-radius:11px;padding:14px"><div style="font-size:10px;font-weight:800;color:var(--amber);margin-bottom:8px">🎯 第二周 — 活动营销</div><div style="font-size:11px;color:var(--t2);line-height:1.9">大促时间线 · 促销工具ROI<br>会员分级体系 · 直播四大心理<br>内容私域 · 跨境本地化</div></div><div style="background:var(--gd);border:1px solid var(--gb);border-radius:11px;padding:14px"><div style="font-size:10px;font-weight:800;color:var(--green);margin-bottom:8px">🔭 第三周 — 产品视野</div><div style="font-size:11px;color:var(--t2);line-height:1.9">RICE优先级 · Roadmap设计<br>北极星指标 · A/B测试陷阱<br>竞品战略分析 · 用户调研方法</div></div><div style="background:var(--rd);border:1px solid rgba(226,59,74,.2);border-radius:11px;padding:14px"><div style="font-size:10px;font-weight:800;color:var(--red);margin-bottom:8px">🚀 第四周 — 综合实战</div><div style="font-size:11px;color:var(--t2);line-height:1.9">PRD写作 · 跨团队协作<br>数据复盘五步法 · 增长飞轮<br>商业模式画布 · 面试技巧</div></div></div></div><div class="pm-insight"><div class="pmi-label">30天学习最重要的一个洞察</div><div class="pmi-text">电商PM的核心竞争力不是"会用更多工具"，而是能在任何电商场景下，快速构建出<strong>完整的问题分析框架</strong>——从数据异常到根因推导，从用户洞察到产品方案，从方案设计到商业论证，每一步都有清晰的思维路径。这才是30天训练的真正成果。</div></div>`,
    flashcards:[{q:'如果只能记住30天课程中的3个核心框架，你会选哪3个？',a:'①GMV=流量×转化×客单×复购（诊断任何电商数据问题的起点）；②飞轮模型（理解平台商业本质和任何产品决策的长期影响）；③用户旅程六阶段（产品改进优先级的直觉框架）。这三个框架能覆盖80%的电商PM日常工作场景。'},{q:'电商PM区别于其他类型PM最独特的思维是什么？',a:'"双边市场意识"——任何产品决策都要同时考虑买家体验和商家经营的影响。改变一个功能可能同时影响：买家的购物体验、商家的运营效率、平台的广告收入、整体飞轮的健康度。这种多利益方思维是电商PM区别于其他PM最核心的能力。'}],
    quiz:[{q:'综合复习题：某平台同时出现：搜索CTR↓20%、新商家30天留存↓15%、大促后GMV崖明显。这三个问题的共同根因最可能是？',opts:['A. 技术问题导致系统响应慢','B. 平台供给质量下降——商家质量变差→搜索结果质量差→CTR下降；商家留存差→供给减少→大促后恢复慢','C. 用户需求发生了变化','D. 竞品抢走了核心用户'],ans:'B',expl:'三个问题背后都指向供给侧问题：搜索CTR低说明搜索结果匹配度差（商品质量/丰富度问题）；新商家留存低说明新供给在快速流失；大促GMV崖说明平台没有足够稳定的高质量供给来维持大促后的消费。根因：商家侧产品力不足，导致供给生态恶化。'},{q:'回顾30天学习，以下哪个认知是正确的？',opts:['A. GMV增长是评估电商PM价值的唯一标准','B. 电商PM的核心工作是设计功能','C. 任何产品决策都要在用户体验、商家经营、平台商业三个维度找到最优平衡','D. 数据越详细分析越准确'],ans:'C',expl:'这是30天课程最核心的认知：电商是双边市场，任何单方面优化都可能损害另一方，最终损害整体飞轮。好的电商PM找到三方利益的最大公约数，而不是牺牲某一方来成就另一方。'}],
    practice:{context:'这是第29天的综合练习，整合全30天的知识体系。',questions:['综合题1：用你学到的所有框架，对"今日头条入局电商（字节电商）"做一个完整的战略分析：他们的优势是什么？面临的最大挑战是什么？如果你是他们的CPO，最优先建设的核心能力是什么？','综合题2：某电商平台在过去一年内同时发生：GMV增长20%（符合预期），但DAU和NPS都在持续下降。从你30天学到的所有知识分析：这意味着什么？这种组合是可持续的吗？接下来会发生什么？','综合题3：回顾这30天学习，写下你自己的"电商PM第一性原理"：3-5条你认为最底层、最不会错的产品思考原则，并举例说明它们如何指导具体的产品决策。']},
  },
  d30:{title:'结业综合测评',tag:'Day 30 · 结业',desc:'30天的终点，也是职业成长的新起点。完成最终综合测评，拿到你的电商PM认证。',
    theory:`<div style="text-align:center;padding:20px 0 24px"><div style="font-size:40px;margin-bottom:12px">🎓</div><div style="font-size:24px;font-weight:700;color:var(--t1);letter-spacing:-.4px;margin-bottom:8px">恭喜完成30天训练！</div><div style="font-size:14px;color:var(--t2);max-width:400px;margin:0 auto;line-height:1.7">你已经系统掌握了电商产品经理所需的核心知识体系。最后一步：完成综合测评，获得你的电商PM认证。</div></div><div style="margin-bottom:16px"><div style="font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">你在这30天学到的核心能力</div><div style="display:flex;flex-direction:column;gap:6px"><div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--gd);border:1px solid var(--gb);border-radius:10px"><span style="font-size:16px">🌀</span><div><div style="font-size:12px;font-weight:700;color:var(--green)">双边市场思维</div><div style="font-size:11px;color:var(--t2)">任何决策都考虑买家、商家、平台三方平衡</div></div></div><div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bld);border:1px solid var(--blb);border-radius:10px"><span style="font-size:16px">📊</span><div><div style="font-size:12px;font-weight:700;color:#8085f5">数据诊断能力</div><div style="font-size:11px;color:var(--t2)">看到指标异常能快速推导根因，精准定位问题</div></div></div><div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--ad);border:1px solid rgba(236,126,0,.25);border-radius:10px"><span style="font-size:16px">⚖️</span><div><div style="font-size:12px;font-weight:700;color:var(--amber)">优先级判断力</div><div style="font-size:11px;color:var(--t2)">在资源有限时，知道什么最重要，并能说服所有人</div></div></div><div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--s3);border:1px solid var(--bd);border-radius:10px"><span style="font-size:16px">🚀</span><div><div style="font-size:12px;font-weight:700;color:var(--t1)">全链路视野</div><div style="font-size:11px;color:var(--t2)">从用户旅程到商业模式，能看到产品的完整影响链</div></div></div></div></div>`,
    flashcards:[{q:'完成30天训练后，如何把这些知识变成实际的工作能力？',a:'三个行动：①每次看到数据异常，先不问别人，自己先用框架分析一遍；②每个产品决策，写下你的假设和预期结果，上线后验证；③每个月找一个你最近遇到的产品问题，用多个框架分析一遍，形成自己的判断标准。知识→能力的转化靠的是刻意练习，而不是记忆。'},{q:'电商产品经理在5年后的发展方向有哪些？',a:'三条主要路径：①技术产品路线：深入某一技术方向（搜索/推荐/支付），成为行业专家，走向技术PM或首席产品官；②业务通用路线：跨品类扩展经验，成为全局产品负责人或CPO；③创业路线：用电商经验创业，做垂直品类或工具产品。三条路都很有价值，关键是想清楚自己追求的是"深度"还是"广度"还是"自主性"。'}],
    quiz:[{q:'作为电商PM，面对"老板今天提了一个新想法，要你马上评估"的情况，最专业的应对是？',opts:['A. 立即开始做','B. 说"这个不重要"然后忽略','C. 用已学的框架快速评估：用户价值→商业价值→实现成本→优先级→给出带数据支撑的建议','D. 等老板再提一次再考虑'],ans:'C',expl:'C展示了PM的核心价值：不是执行者（A），不是拒绝者（B），而是能快速评估并给出数据支撑建议的决策伙伴。这正是高级PM与初级PM的最大区别。'},
    {q:'30天训练结束，以下哪个说法是正确的？',opts:['A. 学完这30天就能成为顶级PM了','B. 这30天建立的框架需要在实际工作中不断运用和修正才能内化','C. 电商PM最重要的是记住所有框架名称','D. 理论知识比实际经验更重要'],ans:'B',expl:'框架是思考的工具，不是答案。这30天建立的是"思考问题的方式"，但让它变成真正的能力，需要在实际工作中不断运用、验证、修正。继续保持这种结构化思考的习惯，每次遇到问题都问自己"我应该用哪个框架来分析这个"，能力就会持续增长。'}],
    practice:{context:'这是你的结业综合测评。请在以下三道题中，展示你30天来的全部学习成果。这将是你电商PM学习历程中最重要的一次答题。',questions:['结业题1（综合诊断）：某电商平台本季度出现了这些数据：月GMV同比+8%（行业增速15%）、新用户同比-12%、老用户复购率从15%↑到22%、商家数量+18%但商家月均GMV-20%、搜索CTR↓25%。请做一个完整的平台健康度诊断：这些数据说明什么，最核心的问题在哪里，优先级最高的改进方向是什么，你会如何向CEO汇报这个情况？','结业题2（产品设计）：请为一个刚刚成立的垂直运动电商平台（0到1阶段，目标用户：一二线城市25-40岁运动爱好者，当前无任何功能，只有一个基本商品上架和购买流程），设计未来12个月的产品路线图。需要包含：北极星指标选择、每个季度的核心功能和目标、预期的用户增长路径、以及你最担心的3个风险及应对方案。','结业题3（个人总结）：写下你30天最重要的三个产品认知升级（与开始训练前相比，什么改变了？），以及你计划如何在接下来3个月的实际工作中运用这些知识（具体的行动计划，不是泛泛而谈）。']},
  },
};

  const dayKeys = Object.keys(DAYS);
  log(`📋 共 ${dayKeys.length} 天课程数据待上传`, 'info');

  for (const dayId of dayKeys) {
    if (_stop) break;

    const d = DAYS[dayId];
    log(`⏳ 上传 ${dayId}：${d.title}...`, 'info');

    try {
      // 清理 theory：如果是 HTML 字符串直接存，如果是对象取 content
      const theoryContent = typeof d.theory === 'string' ? d.theory : (d.theory?.content || '');

      await setDoc(doc(db, 'courses', dayId), {
        id: dayId,
        title: d.title || '',
        tag: d.tag || '',
        desc: d.desc || '',
        theory: theoryContent,
        flashcards: d.flashcards || [],
        quiz: d.quiz || [],
        practice: d.practice || {},
        updatedAt: new Date().toISOString()
      });

      _done++;
      updateStats();
      log(`✅ ${dayId} 上传成功：${d.title}`, 'ok');

      // 每次上传后稍微等一下，避免触发 Firestore 频率限制
      await new Promise(r => setTimeout(r, 300));

    } catch(e) {
      _fail++;
      updateStats();
      log(`❌ ${dayId} 上传失败：${e.message}`, 'err');
    }
  }

  log('────────────────────────────', 'info');
  if (_stop) {
    log(`⏸ 上传已停止。成功 ${_done} 天，失败 ${_fail} 天`, 'warn');
  } else if (_fail === 0) {
    log(`🎉 全部上传完成！共 ${_done} 天课程数据已存入 Firestore`, 'ok');
    log('✅ 现在可以设置 Firestore 安全规则，限制未登录用户访问', 'ok');
  } else {
    log(`⚠️ 上传完成，成功 ${_done} 天，失败 ${_fail} 天，请检查失败项`, 'warn');
  }

  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
};

// ── 检查登录状态 ──
onAuthStateChanged(auth, (user) => {
  if (user) {
    log(`✅ 检测到登录用户：${user.email}`, 'ok');
    log('点击「开始上传」按钮开始上传课程数据', 'info');
  } else {
    log('⚠️ 未检测到登录用户', 'warn');
    log('请先在主网站登录后，再打开此工具页面', 'warn');
    log('或者：打开 F12 控制台，手动执行登录命令', 'info');
  }
});

window.db = db;
window.auth = auth;
</script>
</body>
</html>
